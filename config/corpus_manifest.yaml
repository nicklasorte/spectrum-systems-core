# Phase Z.4 — corpus ingest manifest.
#
# The authoritative list of every transcript in the corpus the
# multi-transcript improvement cycle (Z.5) runs over.
# scripts/ingest_corpus.py reads this file, substitutes {data_lake}
# with the data-lake STORE root ($DATA_LAKE_PATH/store — the dir that
# holds raw/ and processed/ in this repo's layout), and validates +
# chunks each transcript.
#
# meeting_id rule (data_lake_contract.md §3): each `id` matches
# ^[a-z0-9][a-z0-9_-]{0,127}$ and follows the m-YYYY-MM-DD-<slug>
# convention. The Dec 18 kickoff and Nov 20 holdout ids are pinned
# (config/phase_y.yaml depends on them) and MUST NOT be renamed.
#
# raw_path layout is the flat ingest tray
# {data_lake}/raw/transcripts/<file>.txt -> resolves to
# $DATA_LAKE_PATH/store/raw/transcripts/<file>.txt (the spec's Z.4
# ingest input location, distinct from the processed/meetings/<id>/
# tree the pipeline writes). The operator fills in the actual
# filenames once the data-lake clone is present — the ids are stable
# and real.

transcripts:
