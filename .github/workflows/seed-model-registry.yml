name: Seed model registry

# Writes the model_registry.json artifact to the data-lake under
# store/artifacts/config/. All model resolution depends on this file; no
# model strings are hardcoded in code. Update this artifact (re-run with
# force=true) to migrate model versions.
#
# The registry content lives at ai/registry/model_registry.json in this
# repo so the model strings are kept out of workflow YAML (the
# no-model-strings-in-workflows CI gate would otherwise flag them).
# Edit that JSON file and re-run with force=true to roll a new version.
#
# By default this workflow skips if model_registry.json already exists.
# Pass force=true to overwrite an existing registry.

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Overwrite model_registry.json if it already exists"
        type: boolean
        required: false
        default: false

jobs:
  seed-model-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4
        with:
          path: spectrum-systems-core

      - name: Checkout data-lake
        uses: actions/checkout@v4
        with:
          repository: nicklasorte/data-lake
          path: data-lake
          token: ${{ secrets.GH_PAT }}

      - name: Check for existing registry
        id: check
        env:
          CONFIG_DIR: ${{ github.workspace }}/data-lake/store/artifacts/config
          FORCE: ${{ github.event.inputs.force }}
        run: |
          registry="$CONFIG_DIR/model_registry.json"
          if [[ -f "$registry" && "$FORCE" != "true" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Model registry already seeded at $registry (force=false). Skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Copy model_registry.json into data-lake
        if: steps.check.outputs.skip != 'true'
        env:
          SRC: ${{ github.workspace }}/spectrum-systems-core/ai/registry/model_registry.json
          CONFIG_DIR: ${{ github.workspace }}/data-lake/store/artifacts/config
        run: |
          mkdir -p "$CONFIG_DIR"
          # Validate JSON before copying so a malformed registry never lands.
          python -c "import json,sys; json.loads(open('$SRC').read())"
          cp "$SRC" "$CONFIG_DIR/model_registry.json"

      - name: Commit registry to data-lake
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          cd "${{ github.workspace }}/data-lake"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No model registry changes to commit."
            exit 0
          fi
          git add -A
          git commit -m "seed: write model registry artifact"
          git push

      - name: Post seed summary
        env:
          CONFIG_DIR: ${{ github.workspace }}/data-lake/store/artifacts/config
          SKIP: ${{ steps.check.outputs.skip }}
        run: |
          python - <<'EOF'
          import json
          import os
          import pathlib

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
          skip = os.environ.get("SKIP", "false") == "true"
          registry = pathlib.Path(os.environ["CONFIG_DIR"]) / "model_registry.json"

          with open(summary_path, "a") as f:
              f.write("## Model Registry Seed\n\n")
              if skip:
                  f.write("already seeded — skipped (re-run with `force=true` to overwrite)\n\n")
              if not registry.exists():
                  f.write("⚠️ model_registry.json not found after seed step.\n")
                  raise SystemExit(0)
              data = json.loads(registry.read_text())
              models = data.get("models", {})
              f.write("| Task | Model |\n")
              f.write("| --- | --- |\n")
              for task, model in models.items():
                  f.write(f"| `{task}` | `{model}` |\n")
          EOF
