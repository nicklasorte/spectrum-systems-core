name: Run Grounding Gate (Phase 4.A)

# Phone-safe dispatcher for the Phase 4.A substring grounding gate.
# The operator picks a source_id, taps "Run workflow", and the step
# summary surfaces:
#   * total / grounded / ungrounded counts
#   * gate drop rate
#   * top-5 failure reasons with sample item references
#   * recall-collapse warning when grounded rate < 50%
#
# The actual gate logic lives in scripts/run_grounding_gate.py so the
# YAML stays a thin wrapper. To bypass the gate in an emergency
# rollback, flip `disable_gate` to "true"; a grounding_gate_bypass_record
# artifact is written with the operator + timestamp so every override
# is auditable.
#
# Persistence: mirrors the data-lake push pattern used by
# run-haiku-extraction.yml. Three artifacts are written (or a single
# bypass record when the gate is disabled):
#   * grounded_items__<run_id>.json
#   * ungrounded_items/<run_id>.jsonl
#   * grounding_gate_result__<run_id>.json
#
# The script's exit code drives the workflow status:
#   * 0 — gate passed (every claim-shaped item grounded) or bypassed
#   * 1 — at least one item failed; the failure list is still written
#   * 2 — a precondition failed (missing transcript, missing extraction)

on:
  workflow_dispatch:
    inputs:
      source_id:
        description: 'Source ID to run the grounding gate against'
        required: true
        default: '7-ghz-downlink-tig-meeting-kickoff---transcript-20251218'
      run_id:
        description: >-
          Specific extraction run_id to gate. Defaults to the latest
          known-good Phase 4.A extraction. Override only when targeting
          a specific artifact.
        required: false
        default: '7-ghz-downlink-tig-meeting-kickoff-20251218-175052utc-meeting-re-a01658daa307'
      disable_gate:
        description: 'Bypass the gate (writes audit-only bypass record)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

jobs:
  run-grounding-gate:
    runs-on: ubuntu-latest
    env:
      DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
      SOURCE_ID: ${{ github.event.inputs.source_id }}
      RUN_ID: ${{ github.event.inputs.run_id }}
      DISABLE_GATE: ${{ github.event.inputs.disable_gate }}
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Run grounding gate
        id: run_gate
        run: |
          set +e
          BYPASS_FLAG=""
          if [ "${DISABLE_GATE}" = "true" ]; then
            BYPASS_FLAG="--disable-grounding-gate"
            echo "::warning::grounding gate BYPASSED via workflow input"
          fi
          echo "::notice::gating source_id=${SOURCE_ID} run_id=${RUN_ID:-(content-aware selector)}"
          RUN_ID_FLAG=()
          if [ -n "${RUN_ID}" ]; then
            RUN_ID_FLAG=(--run-id "${RUN_ID}")
            echo "::notice::targeting extraction run_id: ${RUN_ID}"
          fi
          python scripts/run_grounding_gate.py \
            --source-id "${SOURCE_ID}" \
            --data-lake "${DATA_LAKE_PATH}" \
            --operator "${GITHUB_ACTOR}" \
            ${BYPASS_FLAG} \
            "${RUN_ID_FLAG[@]}"
          rc=$?
          if [ "${rc}" -eq 0 ]; then
            echo "should_push=true" >> "${GITHUB_OUTPUT}"
            echo "gate_status=passed" >> "${GITHUB_OUTPUT}"
          elif [ "${rc}" -eq 1 ]; then
            # Gate ran but found ungrounded items. We STILL push the
            # ungrounded_items artifact because that audit trail is the
            # whole point. The workflow surfaces "failed" via the
            # final exit so the dispatcher's UI flags it red.
            echo "should_push=true" >> "${GITHUB_OUTPUT}"
            echo "gate_status=failed" >> "${GITHUB_OUTPUT}"
          else
            echo "should_push=false" >> "${GITHUB_OUTPUT}"
            echo "gate_status=precondition_failed" >> "${GITHUB_OUTPUT}"
          fi
          exit "${rc}"

      - name: Ensure data-lake .gitignore negates grounding-gate artifacts
        if: ${{ always() && steps.run_gate.outputs.should_push == 'true' }}
        env:
          CLONE_PATH: ${{ github.workspace }}/data-lake
        run: |
          set -euo pipefail
          GI="$CLONE_PATH/.gitignore"
          touch "$GI"
          add_rule() {
            grep -qxF "$1" "$GI" || printf '%s\n' "$1" >> "$GI"
          }
          add_rule '!**/processed/**/'
          add_rule '!**/processed/**/grounded_items__*.json'
          add_rule '!**/processed/**/grounding_gate_result__*.json'
          add_rule '!**/processed/**/grounding_gate_bypass_record__*.json'
          add_rule '!**/processed/**/ungrounded_items/'
          add_rule '!**/processed/**/ungrounded_items/*.jsonl'
          echo "Ensured grounding-gate artifact negations in data-lake .gitignore"

      - name: Push grounding-gate artifacts to nicklasorte/data-lake
        if: ${{ always() && steps.run_gate.outputs.should_push == 'true' }}
        uses: ./.github/actions/push-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}
          commit_message: >-
            feat(grounding-gate): Phase 4.A gate run for
            ${{ env.SOURCE_ID }}
            (${{ steps.run_gate.outputs.gate_status }}) [skip ci]
          add_paths: |
            .gitignore
            store/processed/meetings/${{ env.SOURCE_ID }}/grounded_items__*.json
            store/processed/meetings/${{ env.SOURCE_ID }}/grounding_gate_result__*.json
            store/processed/meetings/${{ env.SOURCE_ID }}/grounding_gate_bypass_record__*.json
            store/processed/meetings/${{ env.SOURCE_ID }}/ungrounded_items/*.jsonl
