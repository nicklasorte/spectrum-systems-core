name: Diff pipeline runs

# Read-only: clones nicklasorte/data-lake and diffs two run records.
# No push (read-only).

on:
  workflow_dispatch:
    inputs:
      run_a_id:
        description: 'Earlier run ID (e.g. pipeline-run-23)'
        required: true
      run_b_id:
        description: 'Later run ID (e.g. pipeline-run-24)'
        required: true

permissions:
  contents: read

jobs:
  diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]"

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Diff pipeline runs
        env:
          DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
        run: |
          python -m spectrum_systems_core.health.run_diff \
            --data-lake "${{ github.workspace }}/data-lake" \
            --run-a-id "${{ github.event.inputs.run_a_id }}" \
            --run-b-id "${{ github.event.inputs.run_b_id }}" \
            --output-format github_actions_summary
