name: Seed glossary terms

# One-time (re-runnable) seeding of spectrum-domain glossary terms into
# nicklasorte/data-lake at store/artifacts/glossary/. The seed script
# is deterministic and idempotent: re-running it overwrites the same
# files byte-for-byte, so the `force` input is documentary -- there is
# no destructive path.
#
# Post-migration: clones nicklasorte/data-lake, writes the artifact,
# pushes back. The push is additive config data; no PR required.

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Re-seed even if glossary terms already exist"
        required: false
        default: "no"

permissions:
  contents: read

jobs:
  seed-glossary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Seed glossary terms
        env:
          DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
          SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
        run: |
          # seed_glossary.py is deterministic: re-running overwrites
          # files in place with byte-identical content. The `force`
          # input is therefore informational only.
          echo "force input: ${{ github.event.inputs.force }}"
          python scripts/seed_glossary.py \
            --out "${{ github.workspace }}/data-lake/store/artifacts/glossary"

      - name: Push glossary to nicklasorte/data-lake
        uses: ./.github/actions/push-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}
          commit_message: >-
            chore: seed glossary terms for domain adaptation [skip ci]
          add_paths: |
            store/artifacts/glossary/

      - name: Post glossary summary
        env:
          SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
        run: |
          python - <<'EOF'
          import pathlib, os

          sdl_root = os.environ.get("SDL_ROOT", "")
          glossary_dir = pathlib.Path(sdl_root) / "glossary"
          terms = list(glossary_dir.glob("*.json")) if glossary_dir.exists() else []

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
          with open(summary_path, "a") as f:
              f.write("## Glossary Seed\n\n")
              f.write(f"Terms written: **{len(terms)}**\n\n")
              if terms:
                  f.write("Glossary is ready for per-chunk injection.\n")
              else:
                  f.write("No terms found. Check seed_glossary.py output above.\n")
          EOF
