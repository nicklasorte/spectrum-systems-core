name: Seed glossary terms

# One-time (re-runnable) seeding of spectrum-domain glossary terms into the
# data-lake at $SDL_ROOT/glossary/. The seed script is deterministic and
# idempotent: re-running it overwrites the same files byte-for-byte, so the
# `force` input is documentary — there is no destructive path.
#
# Glossary artifacts are additive data, not code, so this workflow pushes
# directly to data-lake `main` (no PR) — the one documented exception to
# the PR-only rule.

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Re-seed even if glossary terms already exist"
        required: false
        default: "no"

permissions:
  contents: write

jobs:
  seed-glossary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Seed glossary terms
        env:
          DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
          SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
        run: |
          # seed_glossary.py is deterministic: re-running overwrites files
          # in place with byte-identical content. The `force` input is
          # therefore informational only.
          echo "force input: ${{ github.event.inputs.force }}"
          python scripts/seed_glossary.py \
            --out "${{ github.workspace }}/data-lake/store/artifacts/glossary"

      - name: Commit glossary to data-lake
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd "${{ github.workspace }}"
          if [[ -z "$(git status --porcelain data-lake/)" ]]; then
            echo "No glossary changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data-lake/
          git commit -m "chore: seed glossary terms for domain adaptation"
          git push

      - name: Post glossary summary
        env:
          SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
        run: |
          python - <<'EOF'
          import pathlib, os

          sdl_root = os.environ.get("SDL_ROOT", "")
          glossary_dir = pathlib.Path(sdl_root) / "glossary"
          terms = list(glossary_dir.glob("*.json")) if glossary_dir.exists() else []

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
          with open(summary_path, "a") as f:
              f.write("## Glossary Seed\n\n")
              f.write(f"Terms written: **{len(terms)}**\n\n")
              if terms:
                  f.write("Glossary is ready for per-chunk injection.\n")
              else:
                  f.write("⚠️ No terms found. Check seed_glossary.py output above.\n")
          EOF
