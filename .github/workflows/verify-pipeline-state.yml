name: Verify pipeline state

# Clones nicklasorte/data-lake, runs the verifier, and pushes
# verification artifacts back.

on:
  workflow_dispatch:
    inputs:
      cycle_id:
        description: 'Verification cycle id (e.g. phase-O-2026-05-11)'
        required: false
        default: ''
      run_compile_findings:
        description: 'Also run compile-findings after the scan'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

jobs:
  verify-pipeline-state:
    runs-on: ubuntu-latest
    env:
      DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
      SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Run verify-pipeline-state
        run: |
          python -m spectrum_systems_core.cli verify-pipeline-state \
            --data-lake "${{ github.workspace }}/data-lake" \
            --emit-actions-summary

      - name: Compile findings
        if: github.event.inputs.run_compile_findings != 'false'
        run: |
          CYCLE_FLAG=""
          if [ -n "${{ github.event.inputs.cycle_id }}" ]; then
            CYCLE_FLAG="--cycle-id ${{ github.event.inputs.cycle_id }}"
          fi
          python -m spectrum_systems_core.cli compile-findings \
            --data-lake "${{ github.workspace }}/data-lake" \
            $CYCLE_FLAG

      - name: Push verification artifacts to nicklasorte/data-lake
        uses: ./.github/actions/push-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}
          commit_message: >-
            verify-pipeline-state: cycle ${{ github.event.inputs.cycle_id || github.run_id }}
            (workflow ${{ github.workflow }}, run ${{ github.run_id }}) [skip ci]
          add_paths: |
            store/artifacts/verifications/
