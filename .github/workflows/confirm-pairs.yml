name: Confirm ground truth pairs

on:
  workflow_dispatch:
    inputs:
      confirm_all_pending:
        description: 'Confirm all pending_review pairs'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false (dry run - show pairs without confirming)'

permissions:
  contents: write

jobs:
  confirm-pairs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Show pending pairs (dry run)
        run: |
          python scripts/confirm_pairs.py \
            --data-lake ${{ github.workspace }}/data-lake \
            --schema-dir ${{ github.workspace }}/contracts/schemas \
            --dry-run

      - name: Confirm pairs
        if: ${{ github.event.inputs.confirm_all_pending == 'true' }}
        run: |
          python scripts/confirm_pairs.py \
            --data-lake ${{ github.workspace }}/data-lake \
            --schema-dir ${{ github.workspace }}/contracts/schemas

      - name: Commit confirmed pairs back to data-lake
        if: ${{ github.event.inputs.confirm_all_pending == 'true' }}
        run: |
          cd "${{ github.workspace }}/data-lake"
          git config user.name "spectrum-pipeline[bot]"
          git config user.email "spectrum-pipeline[bot]@users.noreply.github.com"
          git add store/artifacts/ground_truth/
          if git diff --staged --quiet; then
            echo "No pairs were updated."
          else
            git commit -m "chore: confirm ground truth pairs

          Confirmed by: human_operator
          Workflow run: ${{ github.run_id }}
          Triggered by: ${{ github.actor }}"
            git push
          fi
