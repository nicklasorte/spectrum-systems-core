name: Confirm ground truth pairs

# Post-migration: clones nicklasorte/data-lake to read pending pairs
# and pushes the confirmations back there.

on:
  workflow_dispatch:
    inputs:
      confirm_all_pending:
        description: 'Confirm all pending_review pairs'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false (dry run - show pairs without confirming)'

permissions:
  contents: read

jobs:
  confirm-pairs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Show pending pairs (dry run)
        run: |
          python scripts/confirm_pairs.py \
            --data-lake ${{ github.workspace }}/data-lake \
            --schema-dir ${{ github.workspace }}/contracts/schemas \
            --dry-run

      - name: Confirm pairs
        if: ${{ github.event.inputs.confirm_all_pending == 'true' }}
        run: |
          python scripts/confirm_pairs.py \
            --data-lake ${{ github.workspace }}/data-lake \
            --schema-dir ${{ github.workspace }}/contracts/schemas

      - name: Push confirmed pairs to nicklasorte/data-lake
        if: ${{ github.event.inputs.confirm_all_pending == 'true' }}
        uses: ./.github/actions/push-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}
          commit_message: >-
            chore: confirm ground truth pairs (run ${{ github.run_id }},
            triggered by ${{ github.actor }}) [skip ci]
          add_paths: |
            store/artifacts/ground_truth/
