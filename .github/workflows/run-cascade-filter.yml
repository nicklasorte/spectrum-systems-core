name: Run Cascade Filter (Phase 4.C)

# Phase 4.C cascade filter — per-item Sonnet adjudication of items
# that cleared the Phase 4.A grounding gate. Inputs are the
# `grounded_items__<run_id>.json` artifact and the raw transcript /
# `chunks.jsonl` under nicklasorte/data-lake. Outputs are written
# alongside the grounded artifact:
#
#   cascade_filtered__<run_id>.json      — items the cascade kept
#   cascade_audit__<run_id>.jsonl        — per-item decision log
#   cascade_filter_result__<run_id>.json — counts + drop rate
#   cascade_bypass_record__<run_id>.json — only on --disable-cascade
#
# The cascade is fail-closed: a malformed Sonnet response drops the
# affected batch, a modify that breaks grounding drops the item, and
# the --max-batches cost cap drops every remaining item. We never
# fall back to "keep" silently.
#
# This workflow REPLACES the Phase 2.C cascade workflow (preserved as
# run-cascade-filter-phase-2c-deprecated.yml for audit trail). Do not
# revive the Phase 2.C path for new precision work.

on:
  workflow_dispatch:
    inputs:
      source_id:
        description: 'Source ID to filter'
        required: true
        default: '7-ghz-downlink-tig-meeting-kickoff---transcript-20251218'
      run_id:
        description: >-
          Specific grounded run_id. Defaults to the most recent grounded
          artifact (content-aware selector). Override when targeting a
          specific run.
        required: false
        default: '7-ghz-downlink-tig-meeting-kickoff-20251218-175052utc-meeting-re-a01658daa307'
      disable_cascade:
        description: 'Bypass cascade (writes audit-only bypass record)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      max_batches:
        description: 'Max Sonnet batches (cost cap; default 30)'
        required: false
        default: '30'

permissions:
  contents: read

jobs:
  run-cascade-filter:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
      SOURCE_ID: ${{ github.event.inputs.source_id }}
      RUN_ID: ${{ github.event.inputs.run_id }}
      MAX_BATCHES: ${{ github.event.inputs.max_batches }}
      DISABLE_CASCADE: ${{ github.event.inputs.disable_cascade }}
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Run cascade filter
        id: run_cascade
        run: |
          set +e
          ARGS="--source-id ${SOURCE_ID} --data-lake ${DATA_LAKE_PATH} --operator ${GITHUB_ACTOR}"
          if [ -n "${RUN_ID}" ]; then
            ARGS="${ARGS} --run-id ${RUN_ID}"
          fi
          if [ "${DISABLE_CASCADE}" = "true" ]; then
            ARGS="${ARGS} --disable-cascade"
          fi
          if [ -n "${MAX_BATCHES}" ]; then
            ARGS="${ARGS} --max-batches ${MAX_BATCHES}"
          fi
          python scripts/run_cascade_filter.py ${ARGS} >stdout.log 2>stderr.log
          rc=$?
          cat stdout.log
          cat stderr.log >&2
          echo "rc=${rc}" >> "${GITHUB_OUTPUT}"
          if [ ${rc} -eq 2 ]; then
            {
              echo "## cascade filter PRECONDITION FAILED"
              echo ""
              echo '```'
              tail -n 60 stderr.log
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 2
          fi
          # rc 0 (clean) or rc 1 (drop rate > 50% warning) both write
          # artifacts. Push proceeds in both cases; the warning is
          # already in the step summary.
          exit 0

      # ------------------------------------------------------------------
      # nicklasorte/data-lake bulk-ignores ``processed/``; mirror the
      # negation pattern used by the grounding-gate workflow so the
      # cascade artifacts actually get added to the index.
      # ------------------------------------------------------------------
      - name: Ensure data-lake .gitignore negates the cascade artifacts
        env:
          CLONE_PATH: ${{ github.workspace }}/data-lake
        run: |
          set -euo pipefail
          GI="$CLONE_PATH/.gitignore"
          touch "$GI"
          add_rule() {
            grep -qxF "$1" "$GI" || printf '%s\n' "$1" >> "$GI"
          }
          add_rule '!**/processed/**/'
          add_rule '!**/processed/**/cascade_filtered__*.json'
          add_rule '!**/processed/**/cascade_audit__*.jsonl'
          add_rule '!**/processed/**/cascade_filter_result__*.json'
          add_rule '!**/processed/**/cascade_bypass_record__*.json'
          echo "Ensured cascade artifact negations in data-lake .gitignore"

      - name: Push cascade artifacts to nicklasorte/data-lake
        uses: ./.github/actions/push-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}
          commit_message: >-
            feat(cascade): Phase 4.C cascade artifacts for ${{ env.SOURCE_ID }} (skip-ci marker omitted)
          add_paths: |
            .gitignore
            store/processed/meetings/${{ env.SOURCE_ID }}/cascade_filtered__*.json
            store/processed/meetings/${{ env.SOURCE_ID }}/cascade_audit__*.jsonl
            store/processed/meetings/${{ env.SOURCE_ID }}/cascade_filter_result__*.json
            store/processed/meetings/${{ env.SOURCE_ID }}/cascade_bypass_record__*.json
