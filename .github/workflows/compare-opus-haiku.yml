name: Compare Haiku vs Opus

# Deterministic Haiku-vs-Opus extraction diff (System 1 of the
# self-improvement loop). Reads the Opus reference baseline and the
# promoted Haiku meeting_minutes artifact for one source_id and writes
# a comparison_result artifact + an eval_history.jsonl row to
# nicklasorte/data-lake. ZERO model calls: the comparison is pure
# text matching, so this workflow needs no ANTHROPIC_API_KEY.
#
# Auto-improvement: when haiku_f1_vs_opus < 0.70 and this is not a
# dry run, the workflow dispatches run-correction-miner.yml for the
# same source_id so a quality drop kicks the inner improvement loop.

on:
  workflow_dispatch:
    inputs:
      source_id:
        description: 'Transcript slug to compare'
        required: true
        default: '7-ghz-downlink-tig-meeting-kickoff---transcript-20251218'
      dry_run:
        description: >-
          Run the full comparison but do not write the comparison_result
          artifact to the data-lake. Useful for validating the comparison
          produces valid output before committing.
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      print_inputs:
        description: >-
          Print the haiku and opus artifact paths and item counts before
          comparison runs. Confirms both artifacts are readable.
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      print_scores:
        description: >-
          Print the full comparison_result payload including F1,
          precision, recall by type after comparison runs. Observe-only.
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  actions: write

jobs:
  compare-opus-haiku:
    runs-on: ubuntu-latest
    env:
      SOURCE_ID: ${{ github.event.inputs.source_id }}
      DRY_RUN: ${{ github.event.inputs.dry_run }}
      PRINT_INPUTS: ${{ github.event.inputs.print_inputs }}
      PRINT_SCORES: ${{ github.event.inputs.print_scores }}
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Ensure data-lake .gitignore negation
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          CLONE_PATH: ${{ github.workspace }}/data-lake
        run: |
          set -euo pipefail
          # processed/ is bulk-ignored in nicklasorte/data-lake. Git
          # cannot re-include a file under an excluded directory, so we
          # FIRST re-include the directory chain (directories only) and
          # THEN the specific artifacts — mirroring the established
          # !**/processed/**/source_record.json precedent. Idempotent.
          GI="$CLONE_PATH/.gitignore"
          touch "$GI"
          add_rule() {
            grep -qxF "$1" "$GI" || printf '%s\n' "$1" >> "$GI"
          }
          add_rule '!**/processed/**/'
          add_rule '!**/processed/**/comparisons/'
          add_rule '!**/processed/**/comparisons/*.json'
          add_rule '!**/processed/**/eval_history.jsonl'
          echo "Ensured comparison_result + eval_history negation in data-lake .gitignore"

      - name: Debug — print haiku artifact payload structure
        continue-on-error: true
        run: |
          python - <<'EOF'
          import json, pathlib, glob, sys
          lake = "data-lake/store/processed/meetings/7-ghz-downlink-tig-meeting-kickoff---transcript-20251218"
          files = sorted(glob.glob(f"{lake}/meeting_minutes__*.json"))
          for f in files:
              d = json.loads(pathlib.Path(f).read_text())
              prov = d.get("payload", {}).get("provenance", {})
              payload = d.get("payload") or {}
              counts = {k: len(v) for k, v in payload.items() if isinstance(v, list)}
              print(f"FILE: {f}", file=sys.stderr)
              print(f"  provenance.produced_by: {prov.get('produced_by')}", file=sys.stderr)
              print(f"  payload present: {'payload' in d}", file=sys.stderr)
              print(f"  array counts: {counts}", file=sys.stderr)
          EOF

      - name: Run comparison
        id: compare
        run: |
          set -euo pipefail
          ARGS=( --data-lake "${{ github.workspace }}/data-lake" --source-id "$SOURCE_ID" )
          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=( --dry-run )
          fi
          if [ "$PRINT_INPUTS" = "true" ]; then
            ARGS+=( --print-inputs )
          fi
          if [ "$PRINT_SCORES" = "true" ]; then
            ARGS+=( --print-scores )
          fi
          # STDOUT is pure JSON (the script sends the human table to
          # STDERR). Tee STDOUT to a file the summary/threshold steps
          # parse; STDERR streams to the live log.
          python scripts/compare_opus_haiku.py "${ARGS[@]}" \
            > /tmp/compare_result.json

      - name: Push comparison + eval_history to nicklasorte/data-lake
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: ./.github/actions/push-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}
          commit_message: >-
            feat(comparison): Haiku vs Opus diff for ${{ env.SOURCE_ID }} [skip ci]
          add_paths: |
            .gitignore
            store/processed/

      - name: Post summary table
        if: always()
        run: |
          python - <<'EOF'
          import json, os, pathlib
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
          p = pathlib.Path("/tmp/compare_result.json")
          with open(summary_path, "a") as f:
              f.write("## Haiku vs Opus comparison\n\n")
              if not p.is_file() or not p.read_text().strip():
                  f.write("No result produced (script halted; see log).\n")
                  raise SystemExit(0)
              try:
                  data = json.loads(p.read_text())
              except json.JSONDecodeError:
                  f.write("```\n" + p.read_text() + "\n```\n")
                  raise SystemExit(0)
              if data.get("status") != "success":
                  f.write(f"- status: **{data.get('status')}**\n")
                  f.write(f"- reason: `{data.get('reason')}`\n")
                  f.write(f"- detail: {data.get('detail')}\n")
                  raise SystemExit(0)
              f.write("```\n" + data.get("table", "") + "\n```\n")
              f.write(f"\n- comparison artifact: `{data.get('comparison_artifact_path')}`\n")
              f.write(f"- GT pairs present: {data.get('gt_pairs_present')}\n")
          EOF

      - name: Trigger correction miner when F1 below threshold
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Auto-trigger the improvement loop ONLY when the script
          # succeeded AND F1 < 0.70 AND this was not a dry run (the
          # step-level `if` already gates dry_run; the F1 read gates
          # the rest). A halted/failed comparison never triggers.
          python - <<'EOF' > /tmp/should_trigger
          import json, pathlib
          p = pathlib.Path("/tmp/compare_result.json")
          out = "no"
          if p.is_file() and p.read_text().strip():
              try:
                  d = json.loads(p.read_text())
                  if d.get("status") == "success":
                      f1 = float(d["summary"]["haiku_f1_vs_opus"])
                      if f1 < 0.70:
                          out = "yes"
              except Exception:
                  out = "no"
          print(out)
          EOF
          if [ "$(cat /tmp/should_trigger)" = "yes" ]; then
            echo "F1 < 0.70 — dispatching run-correction-miner.yml for $SOURCE_ID"
            gh workflow run run-correction-miner.yml \
              -f source_id="$SOURCE_ID" \
              -f dry_run=false \
              --repo "${{ github.repository }}"
          else
            echo "F1 >= 0.70 or comparison did not succeed — not triggering correction miner"
          fi

      - name: Debug workflow failure
        if: failure()
        run: |
          python scripts/debug_workflow_failure.py \
            --workflow "${{ github.workflow }}" \
            --job "${{ github.job }}"
