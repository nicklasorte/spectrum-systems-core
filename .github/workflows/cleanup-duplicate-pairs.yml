name: Cleanup duplicate ground truth pairs

# Post-migration: clones nicklasorte/data-lake to scan for duplicate
# pairs, retires them, and pushes the result back there.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (show what would be retired without moving files)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

jobs:
  cleanup-duplicate-pairs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Show duplicates (dry run)
        run: |
          python scripts/cleanup_duplicate_pairs.py \
            --data-lake ${{ github.workspace }}/data-lake \
            --schema-dir ${{ github.workspace }}/contracts/schemas \
            --dry-run

      - name: Run cleanup
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          python scripts/cleanup_duplicate_pairs.py \
            --data-lake ${{ github.workspace }}/data-lake \
            --schema-dir ${{ github.workspace }}/contracts/schemas

      - name: Push retired pairs to nicklasorte/data-lake
        if: ${{ github.event.inputs.dry_run == 'false' }}
        uses: ./.github/actions/push-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}
          commit_message: >-
            chore: retire duplicate ground_truth_pair artifacts (kept oldest
            confirmed pair per (source_artifact_id, minutes_artifact_id), run
            ${{ github.run_id }}) [skip ci]
          add_paths: |
            store/artifacts/ground_truth/
