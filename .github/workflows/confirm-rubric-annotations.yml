name: Confirm rubric annotations

# Phase X2 follow-up — mobile workflow (step 4 of 5).
# Confirms the auto-classified rubric for a source_id and optionally
# overrides a single pair_id. The annotator_id is stamped on every
# rubric_notes block so the audit trail records who confirmed each
# classification.
#
# This workflow does NOT change the auto-classifier; it lets the
# reviewer rubber-stamp the proposals or replace one bad call. For a
# whole-batch re-classification, re-run "Annotate GT rubric".
#
# Post-migration: clones nicklasorte/data-lake to read the rubric
# state and pushes the confirmations back there.

on:
  workflow_dispatch:
    inputs:
      source_id:
        description: 'Source id whose rubric to confirm'
        required: true
        default: '7-ghz-downlink-tig-meeting-kickoff---transcript-20251218'
      reviewer_id:
        description: 'Reviewer (your name)'
        required: true
      confirm_auto_classified:
        description: 'Rubber-stamp the auto-classified rubric'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      override_pair_id:
        description: 'pair_id to override (optional)'
        required: false
        default: ''
      override_outcome:
        description: 'Override expected_decision_outcome for that pair'
        required: false
        default: 'approval'
        type: choice
        options:
          - approval
          - rejection
          - deferral
          - action_required
          - noted
          - question
      gt_file:
        description: >-
          Optional path (relative to the data-lake clone) to a
          human_minutes_gt_pairs.jsonl. When set, confirm/override
          operate on that JSONL instead of the ground_truth/ directory.
        required: false
        default: ''

permissions:
  contents: read

jobs:
  confirm-rubric-annotations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Confirm rubric (and apply optional override)
        id: confirm
        run: |
          python - <<'EOF'
          import json, os, pathlib, sys, datetime

          sys.path.insert(0, "scripts")
          import annotate_rubric

          data_lake = pathlib.Path("data-lake").resolve()
          sdl_root = data_lake / "store" / "artifacts"
          source_id = os.environ["SOURCE_ID"]
          reviewer_id = os.environ["REVIEWER_ID"]
          confirm_all = os.environ["CONFIRM_ALL"] == "true"
          override_pair_id = (os.environ.get("OVERRIDE_PAIR_ID") or "").strip()
          override_outcome = os.environ["OVERRIDE_OUTCOME"]
          gt_file_input = (os.environ.get("GT_FILE") or "").strip()
          gt_file = (data_lake / gt_file_input) if gt_file_input else None

          pairs = annotate_rubric.list_candidates(
              sdl_root, source_id=source_id, limit=10_000, gt_file=gt_file,
          )
          if not pairs:
              raise SystemExit(
                  f"ERROR: source_id '{source_id}' matched 0 pairs."
              )

          updates = []
          n_confirmed = 0
          n_overridden = 0
          for p in pairs:
              pair_id = p.get("pair_id")
              if not pair_id:
                  continue
              rubric = p.get("rubric_notes") or {}
              proposed = rubric.get("expected_decision_outcome")
              if pair_id == override_pair_id:
                  outcome = override_outcome
                  n_overridden += 1
                  notes = "override applied by confirm workflow"
              elif confirm_all and proposed:
                  outcome = proposed
                  n_confirmed += 1
                  notes = "confirmed by reviewer"
              else:
                  continue
              updates.append({
                  "pair_id": pair_id,
                  "expected_decision_outcome": outcome,
                  "verb_discrimination_example": bool(
                      rubric.get("verb_discrimination_example")
                  ),
                  "annotator_id": reviewer_id,
                  "notes": notes,
              })

          pathlib.Path("annotations.json").write_text(
              json.dumps(updates, indent=2), encoding="utf-8"
          )

          total_with_rubric = sum(
              1 for p in pairs if (p.get("rubric_notes") or {}).get(
                  "expected_decision_outcome"
              )
          )
          rollup = {
              "confirmed": n_confirmed,
              "overridden": n_overridden,
              "total_pairs": len(pairs),
              "rubric_coverage": total_with_rubric,
          }
          pathlib.Path("rollup.json").write_text(
              json.dumps(rollup, indent=2), encoding="utf-8"
          )
          EOF
        env:
          SOURCE_ID: ${{ github.event.inputs.source_id }}
          REVIEWER_ID: ${{ github.event.inputs.reviewer_id }}
          CONFIRM_ALL: ${{ github.event.inputs.confirm_auto_classified }}
          OVERRIDE_PAIR_ID: ${{ github.event.inputs.override_pair_id }}
          OVERRIDE_OUTCOME: ${{ github.event.inputs.override_outcome }}
          GT_FILE: ${{ github.event.inputs.gt_file }}

      - name: Apply confirmed/overridden annotations
        env:
          GT_FILE: ${{ github.event.inputs.gt_file }}
        run: |
          GT_FLAG=""
          if [ -n "$GT_FILE" ]; then
            GT_FLAG="--gt-file ${{ github.workspace }}/data-lake/$GT_FILE"
          fi
          python scripts/annotate_rubric.py \
            --data-lake "${{ github.workspace }}/data-lake" \
            --apply-from annotations.json \
            $GT_FLAG

      - name: Push confirmations to nicklasorte/data-lake
        uses: ./.github/actions/push-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}
          commit_message: >-
            chore: confirm rubric for ${{ github.event.inputs.source_id }}
            by ${{ github.event.inputs.reviewer_id }} [skip ci]
          add_paths: |
            store/artifacts/ground_truth/
            store/processed/meetings/${{ github.event.inputs.source_id }}/ground_truth/human_minutes_gt_pairs.jsonl

      - name: Post rollup to step summary
        if: always()
        run: |
          python - <<'EOF'
          import json, os, pathlib

          path = pathlib.Path("rollup.json")
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
          with open(summary_path, "a") as f:
              f.write("## Rubric confirmation rollup\n\n")
              if not path.is_file():
                  f.write("No rollup produced.\n")
                  raise SystemExit(0)
              data = json.loads(path.read_text(encoding="utf-8"))
              f.write(f"- confirmed: **{data.get('confirmed', 0)}**\n")
              f.write(f"- overridden: **{data.get('overridden', 0)}**\n")
              f.write(f"- total pairs: {data.get('total_pairs', 0)}\n")
              f.write(
                  f"- rubric coverage: "
                  f"**{data.get('rubric_coverage', 0)}** "
                  f"/ {data.get('total_pairs', 0)} pairs annotated\n"
              )
          EOF
