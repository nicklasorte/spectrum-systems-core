name: Initialize new source_record.json (one-time backfill)

# One-time backfill for 32 source_ids that were staged manually under
# nicklasorte/data-lake at store/raw/meetings/<source_id>/ with
# source.txt + metadata.json but never run through the SourceLoader
# ingestion stage, so they have no
# store/processed/meetings/<source_id>/source_record.json. Every
# downstream reader (Opus baseline, few-shot preflight, comparators)
# resolves the stable transcript UUID via that record — without it,
# every pipeline run over the slug HALTs.
#
# This workflow runs the deterministic, LLM-free SourceLoader for each
# of the 32 slugs (list frozen inside
# scripts/initialize_new_source_records.py), then runs the companion
# verifier. dry_run defaults to TRUE so the first run can be inspected
# before anything is committed back to nicklasorte/data-lake.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "When true, inspect output and skip the push step."
        required: false
        default: "true"

permissions:
  contents: read

jobs:
  initialize-new-source-records:
    runs-on: ubuntu-latest
    env:
      DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]"

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Initialize missing source_record.json files
        id: initialize
        run: |
          set -euo pipefail
          python scripts/initialize_new_source_records.py \
            --data-lake "${{ github.workspace }}/data-lake" \
            | tee /tmp/initialize_summary.json

      - name: Verify all 32 source_record.json files
        id: verify
        run: |
          set -euo pipefail
          python scripts/verify_initialized_source_records.py \
            --data-lake "${{ github.workspace }}/data-lake" \
            | tee /tmp/verify_summary.json

      - name: Push source records to nicklasorte/data-lake
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: ./.github/actions/push-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}
          commit_message: >-
            chore(ingestion): backfill source_record.json for 32
            manually-staged sources [skip ci][baseline-commit]
          add_paths: |
            store/processed/

      - name: Post summary
        if: always()
        run: |
          python - <<'EOF'
          import json, os, pathlib
          gh = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
          with open(gh, "a") as f:
              f.write("## Initialize new source_record.json\n\n")
              for label, path in (
                  ("initialize", "/tmp/initialize_summary.json"),
                  ("verify",     "/tmp/verify_summary.json"),
              ):
                  f.write(f"### {label}\n\n")
                  p = pathlib.Path(path)
                  if not p.is_file():
                      f.write("(no summary)\n\n")
                      continue
                  data = json.loads(p.read_text(encoding="utf-8"))
                  f.write(f"- status: **{data.get('status')}**\n")
                  f.write(f"- total: {data.get('total_sources')}\n")
                  f.write(f"- counts: `{data.get('counts')}`\n\n")
          EOF
