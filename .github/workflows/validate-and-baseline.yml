name: Validate and baseline (single transcript)

# Phase X2.7 + follow-up — mobile workflow (step 5 of 5).
# End-to-end validation for a single transcript. On push to main that
# touches the extraction / glossary / evals surface, OR on manual
# workflow_dispatch, this workflow:
#
#   1. Clones nicklasorte/data-lake (where transcripts and the
#      baseline live after the data-lake migration).
#   2. Runs the typed-extraction pipeline for the single transcript.
#   3. Verifies the 5 Phase W wiring signals are green.
#   4. Calls `eval-ground-truth --set-baseline --specific-source-id`.
#   5. Commits the resulting baseline_eval_summary back to
#      nicklasorte/data-lake.
#
# Guards:
#   * The baseline commit message contains BOTH the standard
#     skip-ci marker (GitHub honors it to suppress workflow_runs)
#     AND `[baseline-commit]` (which the early-exit step here checks
#     defensively in case the skip-ci marker behavior ever changes).
#   * The early-exit step also short-circuits when
#     `SKIP_BASELINE_WORKFLOW=true` is set as a repository variable
#     so an operator can mute this workflow without editing the YAML.
#
# Out of scope: this is the SINGLE-transcript baseline (a "development"
# baseline). The full-corpus / "production" baseline is set after all
# 13 transcripts have run, via the same CLI without
# `--specific-source-id`.

on:
  push:
    branches: [main]
    paths:
      - 'src/spectrum_systems_core/extraction/**'
      - 'src/spectrum_systems_core/glossary/**'
      - 'src/spectrum_systems_core/evals/**'
      - 'src/spectrum_systems_core/agenda/**'
  workflow_dispatch:
    inputs:
      source_id:
        description: 'source_id to validate + baseline'
        required: false
        default: '7-ghz-downlink-tig-meeting-kickoff---transcript-20251218'
      force_baseline:
        description: 'Pass --set-baseline even when wiring signals fail (override)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      enable_judge:
        description: 'Run LLM-as-judge during this validation'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  # actions: write so the post-baseline step can dispatch
  # compare-opus-haiku.yml (the self-improvement loop entry point).
  actions: write

env:
  TARGET_SOURCE_ID: ${{ github.event.inputs.source_id || '7-ghz-downlink-tig-meeting-kickoff---transcript-20251218' }}
  FORCE_BASELINE: ${{ github.event.inputs.force_baseline || 'false' }}
  JUDGE_ENABLED: ${{ github.event.inputs.enable_judge || 'false' }}

jobs:
  early-exit-check:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Check skip guards
        id: check
        run: |
          # Two guards: [baseline-commit] in HEAD message OR explicit
          # SKIP_BASELINE_WORKFLOW variable. If GitHub's skip-ci tag is
          # ever ignored, this still prevents an infinite loop because
          # the baseline commit itself carries [baseline-commit].
          if [ "${SKIP_BASELINE_WORKFLOW:-false}" = "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::SKIP_BASELINE_WORKFLOW is true; exiting."
            exit 0
          fi
          MSG="${{ github.event.head_commit.message }}"
          case "$MSG" in
            *"[baseline-commit]"*)
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "::notice::HEAD is a baseline commit; exiting to break loops."
              exit 0
              ;;
          esac
          echo "skip=false" >> "$GITHUB_OUTPUT"
        env:
          SKIP_BASELINE_WORKFLOW: ${{ vars.SKIP_BASELINE_WORKFLOW }}

  validate-and-baseline:
    needs: early-exit-check
    if: needs.early-exit-check.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    env:
      DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
      SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
      PIPELINE_RUN_ID: ${{ github.run_id }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install anthropic

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Verify target transcript present in data-lake
        # The transcript lives in nicklasorte/data-lake; the
        # spectrum-systems-core repo no longer ships fixtures for it.
        # Fail fast if the directory is empty so a misconfigured
        # data-lake (e.g. clone partial / wrong branch) does not
        # silently produce zero-content baselines.
        run: |
          set -euo pipefail
          DEST_DIR="$DATA_LAKE_PATH/store/raw/transcripts"
          if [ ! -d "$DEST_DIR" ] || [ -z "$(find "$DEST_DIR" -name '*.txt' -print -quit)" ]; then
            echo "::error::no transcripts found in $DEST_DIR"
            exit 1
          fi
          ls -la "$DEST_DIR"

      # ------------------------------------------------------------------
      # 0b. Ensure the versioned glossary aggregate exists.
      #
      # ``typed_extraction_runner._resolve_versioned_glossary_artifact``
      # loads ``<sdl_root>/glossary/spectrum_glossary_v1.json``. When
      # this file is absent the runner falls back to an empty term list
      # and every per-chunk injection produces zero matches, which
      # flips the ``glossary_terms_injected_present`` wiring signal to
      # MISSING. This step makes the workflow self-healing: if the
      # aggregate is missing, regenerate it from
      # ``scripts/seed_glossary.py`` (deterministic, byte-identical
      # output) so the extraction run sees terms even if the operator
      # has not re-run ``seed-glossary.yml`` since the aggregate
      # filename was introduced. The aggregate is then included in
      # the data-lake push so subsequent runs hit it directly without
      # re-seeding.
      # ------------------------------------------------------------------
      - name: Ensure versioned glossary aggregate exists
        run: |
          set -euo pipefail
          AGG="$SDL_ROOT/glossary/spectrum_glossary_v1.json"
          if [ -f "$AGG" ]; then
            echo "versioned glossary aggregate already present: $AGG"
            exit 0
          fi
          echo "versioned glossary aggregate missing — building from seed_glossary.py"
          python scripts/seed_glossary.py --out "$SDL_ROOT/glossary"
          if [ ! -f "$AGG" ]; then
            echo "::error::seed_glossary.py did not produce $AGG"
            exit 1
          fi
          echo "wrote $AGG"

      # ------------------------------------------------------------------
      # 1. Run the extraction pipeline for the single transcript.
      # ------------------------------------------------------------------
      - name: Run pipeline for target transcript
        run: |
          python -m spectrum_systems_core.cli run-pipeline \
            --data-lake "${DATA_LAKE_PATH}" \
            --specific-source-id "${TARGET_SOURCE_ID}" \
            --force

      # ------------------------------------------------------------------
      # 1b. Run typed extraction for the target transcript.
      #
      # ``run-pipeline`` writes a fresh ``source_record.json`` (with a new
      # ``artifact_id`` under ``--force``) but it does NOT call typed
      # extraction — that is a separate CLI command. Without this step
      # the signal checker resolves the new ``source_artifact_id`` from
      # the just-written source_record and then fails to find any
      # ``meeting_extraction`` artifact carrying it (the committed
      # extraction artifact, if any, still carries the OLD UUID), so
      # ``binding_taxonomy_present`` and the other extraction-scoped
      # signals are MISSING. Mirrors the sequence in
      # ``debug-single-transcript.yml`` (run-pipeline → extract-typed).
      # ------------------------------------------------------------------
      - name: Run typed extraction for target transcript
        run: |
          python -m spectrum_systems_core.cli extract-typed \
            --source-id "${TARGET_SOURCE_ID}" \
            --data-lake "${DATA_LAKE_PATH}" \
            --force

      # ------------------------------------------------------------------
      # 2. Verify the 5 wiring signals (X2.7 success criterion).
      # ------------------------------------------------------------------
      - name: Verify Phase W wiring signals
        id: verify
        run: |
          set -euo pipefail
          python <<'PY'
          import json, os, pathlib, sys

          sdl = pathlib.Path(os.environ["SDL_ROOT"])
          source = os.environ["TARGET_SOURCE_ID"]
          report = {
              "agenda_item_id_nonnull": False,
              "few_shot_present_with_verified": False,
              "glossary_terms_injected_present": False,
              "binding_taxonomy_present": False,
              "generalization_check_ran": False,
          }

          # Resolve slug source_id -> UUID source_artifact_id via source_record.json.
          # Extraction artifacts are written with ``source_artifact_id`` (UUID) and
          # ``source_id`` left absent, so a slug-only filter on the extraction
          # artifact silently skips every file. Mirror the resolver pattern from
          # ``scripts/_few_shot_preflight.resolve_source_artifact_id``.
          source_artifact_id = None
          processed_root = sdl.parent.parent / "store" / "processed"
          if processed_root.is_dir():
              for family_dir in processed_root.iterdir():
                  sr = family_dir / source / "source_record.json"
                  if sr.is_file():
                      try:
                          sr_doc = json.loads(sr.read_text())
                      except Exception:
                          sr_doc = None
                      if isinstance(sr_doc, dict):
                          aid = sr_doc.get("artifact_id")
                          if isinstance(aid, str) and aid:
                              source_artifact_id = aid
                      break

          # 1) agenda_item_id non-null on chunks.jsonl
          chunks_path = sdl.parent.parent / "store" / "processed" / "meetings" / source / "stories" / "chunks.jsonl"
          if chunks_path.is_file():
              with chunks_path.open() as fh:
                  for line in fh:
                      try:
                          c = json.loads(line)
                      except Exception:
                          continue
                      if isinstance(c.get("agenda_item_id"), str) and c["agenda_item_id"]:
                          report["agenda_item_id_nonnull"] = True
                          break

          # 2) decision_examples_v1.json present + >=1 verified example
          fewshot = sdl / "evals" / "few_shot" / "decision_examples_v1.json"
          if fewshot.is_file():
              doc = json.loads(fewshot.read_text())
              examples = doc.get("examples") or []
              if any(isinstance(ex, dict) and ex.get("verified") is True for ex in examples):
                  report["few_shot_present_with_verified"] = True

          def _matches_source(doc):
              # Match either field for forward compat. Extraction artifacts
              # use source_artifact_id (UUID); orchestration_result uses
              # source_id (slug). Either match counts.
              if not isinstance(doc, dict):
                  return False
              if source_artifact_id and doc.get("source_artifact_id") == source_artifact_id:
                  return True
              if doc.get("source_id") == source:
                  return True
              return False

          # 3) glossary injection ran with >=1 term injected. The persisted
          # location is ``orchestration_result.glossary_injection_summary``;
          # ``chunk_extraction_records`` only lives in the runtime result dict
          # (typed_extraction_runner.py:1524) and is NEVER written to disk by
          # ExtractionMerger.write_to. Reading the orchestration_result rollup
          # is the only way to verify the W.1 wiring on disk.
          orch_dir = sdl / "orchestration"
          if orch_dir.is_dir():
              for path in orch_dir.glob("*.json"):
                  try:
                      doc = json.loads(path.read_text())
                  except Exception:
                      continue
                  if not _matches_source(doc):
                      continue
                  summary_obj = doc.get("glossary_injection_summary")
                  if isinstance(summary_obj, dict):
                      injected = summary_obj.get("total_term_injections") or 0
                      matches = summary_obj.get("chunks_with_matches") or 0
                      if injected > 0 or matches > 0:
                          report["glossary_terms_injected_present"] = True
                          break

          # 4) regulatory_verb (or decision_outcome) present on >=1 decision
          extr_dir = sdl / "extractions"
          if extr_dir.is_dir():
              for path in extr_dir.glob("*.json"):
                  try:
                      doc = json.loads(path.read_text())
                  except Exception:
                      continue
                  if not _matches_source(doc):
                      continue
                  for d in doc.get("decisions") or []:
                      if isinstance(d, dict) and (
                          isinstance(d.get("regulatory_verb"), str)
                          or isinstance(d.get("decision_outcome"), str)
                      ):
                          report["binding_taxonomy_present"] = True
                          break

          # 5) scope_overgeneralization_count present on orchestration_result
          if orch_dir.is_dir():
              for path in orch_dir.glob("*.json"):
                  try:
                      doc = json.loads(path.read_text())
                  except Exception:
                      continue
                  if not _matches_source(doc):
                      continue
                  if "scope_overgeneralization_count" in doc:
                      report["generalization_check_ran"] = True
                      break

          all_green = all(report.values())
          summary = "\n".join(f"- {k}: {'OK' if v else 'MISSING'}" for k, v in report.items())
          print("Phase W wiring signals:")
          print(summary)
          print(f"resolved source_artifact_id: {source_artifact_id}")
          gh_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if gh_summary:
              with open(gh_summary, "a") as fh:
                  fh.write("## Phase W wiring signals\n\n")
                  fh.write(summary)
                  fh.write("\n")
                  fh.write(f"\nresolved source_artifact_id: `{source_artifact_id}`\n")
          if not all_green and os.environ.get("FORCE_BASELINE") != "true":
              sys.exit(1)
          if not all_green:
              print(
                  "::warning::FORCE_BASELINE=true; continuing despite "
                  "missing wiring signals (operator override)."
              )
          PY

      # ------------------------------------------------------------------
      # 3. Set the baseline (only when all 5 signals are green OR
      #    force_baseline=true).
      # ------------------------------------------------------------------
      - name: Set development baseline
        run: |
          python -m spectrum_systems_core.cli eval-ground-truth \
            --data-lake "${DATA_LAKE_PATH}" \
            --set-baseline \
            --specific-source-id "${TARGET_SOURCE_ID}"

      # ------------------------------------------------------------------
      # 4. Commit baseline artifacts back to nicklasorte/data-lake.
      #    IMPORTANT: BOTH the standard skip-ci marker and
      #    [baseline-commit] go in the message; the early-exit guard
      #    inspects [baseline-commit] as defense-in-depth.
      # ------------------------------------------------------------------
      - name: Push baseline artifacts
        if: success()
        uses: ./.github/actions/push-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}
          commit_message: >-
            baseline: development baseline for ${{ env.TARGET_SOURCE_ID }} [skip ci] [baseline-commit]
          add_paths: |
            store/artifacts/evals/
            store/artifacts/health/
            store/artifacts/glossary/

      # ------------------------------------------------------------------
      # 5. Self-improvement loop entry: once the baseline is set, kick
      #    the Haiku-vs-Opus comparison IFF both the Opus baseline and
      #    a Haiku LLM meeting_minutes artifact exist for the target.
      #    A missing input is a clean skip, never a workflow failure —
      #    the comparison/correction loop is opportunistic.
      # ------------------------------------------------------------------
      - name: Trigger Haiku-vs-Opus comparison
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          MEET_DIR="$DATA_LAKE_PATH/store/processed/meetings/$TARGET_SOURCE_ID"
          OPUS="$MEET_DIR/reference_baselines/opus_reference_minutes.jsonl"
          HAVE_OPUS=no
          HAVE_HAIKU=no
          if [ -s "$OPUS" ]; then
            HAVE_OPUS=yes
          fi
          # A Haiku LLM artifact is a meeting_minutes__*.json whose
          # payload.provenance.produced_by == "meeting_minutes_llm".
          # A regex-extractor artifact does NOT count (comparing it to
          # the Opus baseline is meaningless).
          if [ -d "$MEET_DIR" ]; then
            FOUND="$(python - "$MEET_DIR" <<'EOF'
          import glob, json, os, sys
          mdir = sys.argv[1]
          for p in sorted(glob.glob(os.path.join(mdir, "meeting_minutes__*.json"))):
              try:
                  art = json.load(open(p, encoding="utf-8"))
              except Exception:
                  continue
              prov = (art.get("payload") or {}).get("provenance") or {}
              if prov.get("produced_by") == "meeting_minutes_llm":
                  print("yes")
                  break
          EOF
          )"
            if [ "$FOUND" = "yes" ]; then
              HAVE_HAIKU=yes
            fi
          fi
          if [ "$HAVE_OPUS" = "yes" ] && [ "$HAVE_HAIKU" = "yes" ]; then
            echo "Dispatching compare-opus-haiku.yml for $TARGET_SOURCE_ID"
            gh workflow run compare-opus-haiku.yml \
              -f source_id="$TARGET_SOURCE_ID" \
              -f dry_run=false \
              --repo "${{ github.repository }}"
          else
            echo "skipped: missing opus baseline or haiku llm output (opus=$HAVE_OPUS haiku=$HAVE_HAIKU)"
          fi

      # ------------------------------------------------------------------
      # Step summary -- single-page operator view.
      # ------------------------------------------------------------------
      - name: Append step summary
        if: always()
        run: |
          {
            echo "## Validate-and-baseline result"
            echo ""
            echo "Target source: \`${TARGET_SOURCE_ID}\`"
            echo "Force baseline: \`${FORCE_BASELINE}\`"
            echo "Judge enabled: \`${JUDGE_ENABLED}\`"
            echo ""
            echo "After this workflow merges, the development baseline"
            echo "is set. The gate_decision artifact carries"
            echo "\`baseline_type: development\`."
          } >> "$GITHUB_STEP_SUMMARY"
