name: Select few-shot candidates

# Phase X2 follow-up — mobile workflow (step 1 of 5).
# Reads the most-recent meeting_extraction for a source_id and writes
# up to N candidate decisions (one per outcome bucket) into
# decision_examples_v1.json with verified=false. Each candidate's UUID
# is rendered in the step summary so a phone reviewer can paste it
# into the "Verify few-shot example" workflow without scrolling logs.
#
# Reads only; the verified=true promotion is owned by the next
# workflow (verify-few-shot-example.yml). No ANTHROPIC_API_KEY usage
# (selection is fully deterministic over existing artifacts).

on:
  workflow_dispatch:
    inputs:
      source_id:
        description: 'Source id (meeting_id) to mine for candidates'
        required: true
        default: '7-ghz-downlink-tig-meeting-kickoff---transcript-20251218'
      max_candidates:
        description: 'Cap on candidates written (1..3)'
        required: false
        default: '3'

permissions:
  contents: write

jobs:
  select-few-shot-candidates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: List data-lake extraction artifacts
        if: always()
        run: |
          echo "=== Extraction artifacts in data-lake ==="
          find data-lake/store -name "*.json" -type f 2>/dev/null | head -50 | while read f; do
            type=$(python -c "import json,sys; d=json.load(open('$f')); print(d.get('artifact_type','?'))" 2>/dev/null || echo "?")
            sid=$(python -c "import json,sys; d=json.load(open('$f')); print(d.get('source_id') or d.get('source_artifact_id') or '?')" 2>/dev/null || echo "?")
            echo "  $f | type=$type | source=$sid"
          done
          echo "=== source_record.json files ==="
          find data-lake/store/processed -name "source_record.json" -type f 2>/dev/null | head -20 | while read f; do
            aid=$(python -c "import json,sys; d=json.load(open('$f')); print(d.get('artifact_id','?'))" 2>/dev/null || echo "?")
            echo "  $f | artifact_id=$aid"
          done
          echo "=== Done ==="

      - name: Select few-shot candidates
        id: select
        run: |
          python scripts/select_few_shot_examples.py \
            --source-id "${{ github.event.inputs.source_id }}" \
            --data-lake "${{ github.workspace }}/data-lake" \
            --max-examples "${{ github.event.inputs.max_candidates }}"

      - name: Verify no placeholders remain
        if: success()
        run: |
          python - <<'PY'
          import json, sys, pathlib

          path = pathlib.Path(
              "data-lake/store/artifacts/evals/few_shot/decision_examples_v1.json"
          )
          if not path.exists():
              print("ERROR: decision_examples_v1.json not found")
              sys.exit(1)

          doc = json.loads(path.read_text(encoding="utf-8"))
          examples = doc.get("examples", []) or []
          placeholders = [
              e for e in examples
              if str(e.get("example_id", "")).startswith("phase-v-placeholder")
          ]

          if placeholders:
              print(f"FAIL: {len(placeholders)} placeholder(s) still in artifact:")
              for p in placeholders:
                  print(f"  {p.get('example_id')}")
              print(
                  "The commit step will not run. Check the "
                  "'Select few-shot candidates' step log."
              )
              sys.exit(1)

          real = [
              e for e in examples
              if not str(e.get("example_id", "")).startswith("phase-v-placeholder")
          ]
          print(f"OK: {len(real)} real example(s), 0 placeholders")
          PY

      - name: Commit candidates to data-lake
        run: |
          cd "${{ github.workspace }}/data-lake"
          git config user.name "spectrum-pipeline[bot]"
          git config user.email "spectrum-pipeline[bot]@users.noreply.github.com"
          git add store/artifacts/evals/few_shot/
          if git diff --staged --quiet; then
            echo "No few-shot updates to commit."
          else
            git commit -m "chore: select few-shot candidates for ${{ github.event.inputs.source_id }} [skip ci]"
            git push
          fi

      - name: Post candidate table to step summary
        if: always()
        run: |
          python - <<'EOF'
          import json, os, pathlib

          artifact = pathlib.Path(
              "data-lake/store/artifacts/evals/few_shot/decision_examples_v1.json"
          )
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
          with open(summary_path, "a") as f:
              f.write("## Few-shot candidates selected\n\n")
              if not artifact.is_file():
                  f.write("No candidate artifact found.\n")
                  raise SystemExit(0)
              doc = json.loads(artifact.read_text(encoding="utf-8"))
              examples = doc.get("examples") or []
              if not examples:
                  f.write("No candidates were written.\n")
                  raise SystemExit(0)
              f.write("| example_id | outcome | confidence | source_turn_ids |\n")
              f.write("|---|---|---|---|\n")
              for ex in examples:
                  eid = ex.get("example_id", "?")
                  exp = ex.get("expected_output", {}) or {}
                  outcome = exp.get("decision_outcome", "?")
                  conf = exp.get("confidence", "?")
                  turns = ex.get("source_turn_ids") or []
                  turns_str = ",".join(map(str, turns))[:60]
                  status = "[unverified]"
                  f.write(f"| `{eid}` | {outcome} {status} | {conf} | {turns_str} |\n")
              f.write("\n### Decision text\n\n")
              for ex in examples:
                  eid = ex.get("example_id", "?")
                  exp = ex.get("expected_output", {}) or {}
                  decision_text = exp.get("decision_text") or ex.get("input_text", "")
                  f.write(f"**`{eid}`**\n\n> {decision_text}\n\n")
              f.write("\n### Next step\n\n")
              f.write(
                  "Copy an `example_id` above and paste it into the "
                  "**Verify few-shot example** workflow. "
                  "Use this ID in the next workflow.\n"
              )
          EOF
