name: Compare vs Human Minutes

# Phone-safe dispatcher for the human-minutes F1 measurement. Ingests
# the NTIA-authored .txt minutes for one source_id, then runs the
# deterministic comparison against the most recent promoted
# meeting_minutes extraction artifact (Haiku, Opus, or Sonnet — the
# producer is selected by the model_token input). ZERO LLM calls in
# either step.
#
# Writes two artifacts to nicklasorte/data-lake:
#   * store/processed/meetings/<source_id>/human_minutes__<source_id>.json
#   * store/processed/meetings/<source_id>/human_minutes_comparison__<source_id>.json

on:
  workflow_dispatch:
    inputs:
      source_id:
        description: 'Transcript slug to compare'
        required: true
        default: '7-ghz-downlink-tig-meeting-kickoff---transcript-20251218'
      minutes_file:
        description: 'Path to the human-minutes .txt file under store/raw/minutes/'
        required: true
        default: 'store/raw/minutes/7 GHz Downlink TIG Kickoff Meeting Minutes 20251218 FINAL.txt'
      model_token:
        description: >-
          Restrict to extraction artifacts whose provenance.model_id
          contains this token (e.g. "haiku", "opus", "sonnet"). Leave
          empty to use the most-recent meeting_minutes artifact.
        required: false
        default: ''
      extraction_run_id:
        description: 'Optional filename substring filter on meeting_minutes__*.json'
        required: false
        default: ''
      match_threshold:
        description: 'SequenceMatcher ratio threshold (default 0.45)'
        required: false
        default: '0.45'
      dry_run:
        description: 'Run end-to-end but do not write artifacts to the data-lake.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  actions: write

jobs:
  compare-vs-human-minutes:
    runs-on: ubuntu-latest
    env:
      SOURCE_ID: ${{ github.event.inputs.source_id }}
      MINUTES_FILE: ${{ github.event.inputs.minutes_file }}
      MODEL_TOKEN: ${{ github.event.inputs.model_token }}
      EXTRACTION_RUN_ID: ${{ github.event.inputs.extraction_run_id }}
      MATCH_THRESHOLD: ${{ github.event.inputs.match_threshold }}
      DRY_RUN: ${{ github.event.inputs.dry_run }}
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Ensure data-lake .gitignore negation
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          CLONE_PATH: ${{ github.workspace }}/data-lake
        run: |
          set -euo pipefail
          GI="$CLONE_PATH/.gitignore"
          touch "$GI"
          add_rule() {
            grep -qxF "$1" "$GI" || printf '%s\n' "$1" >> "$GI"
          }
          add_rule '!**/processed/**/'
          add_rule '!**/processed/**/human_minutes__*.json'
          add_rule '!**/processed/**/human_minutes_comparison__*.json'
          echo "Ensured human_minutes + comparison negation in data-lake .gitignore"

      - name: Ingest human minutes
        id: ingest
        run: |
          set -euo pipefail
          ARGS=(
            --minutes-file "${{ github.workspace }}/data-lake/$MINUTES_FILE"
            --source-id "$SOURCE_ID"
            --data-lake "${{ github.workspace }}/data-lake"
          )
          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=( --dry-run )
          fi
          python scripts/ingest_human_minutes.py "${ARGS[@]}" \
            | tee /tmp/ingest_result.txt

      - name: Run comparison vs extraction artifact
        id: compare
        run: |
          set -euo pipefail
          ARGS=(
            --source-id "$SOURCE_ID"
            --data-lake "${{ github.workspace }}/data-lake"
            --match-threshold "$MATCH_THRESHOLD"
            --print-scores
          )
          if [ -n "$MODEL_TOKEN" ]; then
            ARGS+=( --model-token "$MODEL_TOKEN" )
          fi
          if [ -n "$EXTRACTION_RUN_ID" ]; then
            ARGS+=( --extraction-run-id "$EXTRACTION_RUN_ID" )
          fi
          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=( --dry-run )
          fi
          python scripts/compare_haiku_vs_human_minutes.py "${ARGS[@]}" \
            > /tmp/compare_result.json

      - name: Push human_minutes + comparison to nicklasorte/data-lake
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: ./.github/actions/push-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}
          commit_message: >-
            feat(gold): human_minutes + comparison for ${{ env.SOURCE_ID }} [skip ci]
          add_paths: |
            .gitignore
            store/processed/

      - name: Post summary
        if: always()
        run: |
          python - <<'EOF'
          import json, os, pathlib
          path = pathlib.Path("/tmp/compare_result.json")
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
          with open(summary_path, "a") as f:
              if not path.is_file() or not path.read_text().strip():
                  f.write("Comparison produced no output.\n")
                  raise SystemExit(0)
              try:
                  data = json.loads(path.read_text())
              except json.JSONDecodeError:
                  f.write("```\n" + path.read_text() + "\n```\n")
                  raise SystemExit(0)
              if data.get("status") == "halt":
                  f.write(f"- status: **halt**\n")
                  f.write(f"- reason: `{data.get('reason')}`\n")
                  f.write(f"- detail: {data.get('detail')}\n")
                  raise SystemExit(0)
              # Dry-run prints the full artifact; non-dry prints a status object.
              if data.get("artifact_type") == "human_minutes_comparison":
                  artifact = data
              else:
                  artifact = None
                  summary = data.get("summary", {})
                  f.write("## Human-minutes comparison\n\n")
                  f.write(f"- comparison artifact: `{data.get('comparison_artifact_path')}`\n")
                  f.write(f"- precision_vs_human: **{summary.get('precision_vs_human')}**\n")
                  f.write(f"- recall_vs_human: **{summary.get('recall_vs_human')}**\n")
                  f.write(f"- f1_vs_human: **{summary.get('f1_vs_human')}**\n")
                  f.write(f"- over_extraction_ratio: **{summary.get('over_extraction_ratio')}**\n")
                  f.write(f"- total_human_items: {summary.get('total_human_items')}\n")
                  f.write(f"- extraction_total_items: {summary.get('extraction_total_items')}\n")
              if artifact is not None:
                  f.write("## Human-minutes comparison (dry-run)\n\n")
                  f.write("```json\n" + json.dumps(artifact, indent=2)[:8000] + "\n```\n")
          EOF
