name: Debug LLM extraction (isolated)

# Minimal one-shot debug workflow. Runs ONLY the meeting-minutes-llm CLI
# step against an already-staged transcript — no run-pipeline, no
# extract-typed, no GT-pair generation, no baseline, no comparison. The
# deterministic pipeline must have already staged
# <data-lake>/store/raw/meetings/<source_id>/source.txt (the CLI HALTS
# with exit 2 if it has not). Cutting the deterministic stages out drops
# the schema-gate iteration loop from ~10 minutes to under 2.
#
# Data-lake persistence (was missing — the bug this workflow had):
# the CLI writes the promoted artifact to the LOCAL data-lake clone at
# store/processed/meetings/<source_id>/meeting_minutes__<slug>.json and
# prints "... OK ... written=<path>" (exit 0), but the runner is
# ephemeral. Without a commit+push the file died with the runner — the
# job reported success while the data-lake never received the artifact.
# A FULL promotion run now negates the data-lake .gitignore (mirroring
# the !**/processed/**/source_record.json precedent), commits + pushes
# the artifact to nicklasorte/data-lake via the push-data-lake composite
# action, then VERIFIES the file exists in the freshly fetched
# origin/main before the job is allowed to pass.
#
# Fast-iteration / diagnostic modes (max_chunks, single_chunk,
# print_raw_response, minimal_repro, diff_vs_opus, test_parser_only)
# intentionally do NOT push: their artifact is truncated or never
# written, and the data-lake is append-only — a partial debug artifact
# must never pollute it.
#
# Trigger manually from the Actions tab with workflow_dispatch.

on:
  workflow_dispatch:
    inputs:
      source_id:
        description: "Source ID (slug) to run meeting-minutes-llm for"
        required: true
        default: "7-ghz-downlink-tig-meeting-kickoff---transcript-20251218"
      max_chunks:
        description: >-
          DEBUG ONLY. Integer cap on transcript chunks (leave empty for
          all chunks). Fast schema-gate iteration only.
        required: false
        default: ""
      debug_chunks:
        description: >-
          DEBUG ONLY. Print a per-chunk decomposition of the run's
          evals (which chunk produced each blocking verb / within-source
          / schema item) to stdout. Observe-only.
        required: false
        type: boolean
        default: false
      print_raw_response:
        description: 'Print raw API response before parsing (Mode 1)'
        required: false
        type: boolean
        default: false
      minimal_repro:
        description: 'Standalone 3-turn API call bypassing framework (Mode 2)'
        required: false
        type: boolean
        default: false
      diff_vs_opus:
        description: 'Diff LLM API call params against Opus baseline (Mode 3)'
        required: false
        type: boolean
        default: false
      test_parser_only:
        description: 'Feed synthetic response into real parser, no API call (Mode 4)'
        required: false
        type: boolean
        default: false
      single_chunk:
        description: >-
          DEBUG ONLY. Run extraction on ONLY the single largest
          transcript chunk (by character count) — one API call. Prints
          the SINGLE CHUNK MODE header, the raw model response, and the
          chunk's eval results. Takes precedence over max_chunks.
        required: false
        type: boolean
        default: false
      print_context:
        description: >-
          DEBUG ONLY. With single_chunk, also print the first 1000
          characters of the context bundle sent to the model so you can
          confirm the transcript content reached the API call.
        required: false
        type: boolean
        default: false
      model:
        description: >-
          Phase 5. Extraction model token. One of: haiku (default),
          sonnet (Haiku prompt + Sonnet model, apples-to-apples),
          sonnet-unconstrained (Opus prompt + Sonnet model — requires
          the Phase 4a Opus prompt on disk), or opus (ceiling baseline).
          Passed verbatim to the CLI's --model flag; the CLI HALTS on
          an unknown token. Default `haiku` is byte-identical to
          pre-Phase-5 behaviour.
        required: false
        type: choice
        options:
          - haiku
          - sonnet
          - sonnet-unconstrained
          - opus
        default: haiku
      cascade_filter:
        description: >-
          Phase 6 (Stage 2 cascade). When true, dispatches
          --enable-cascade-filter --confirm-cost: after Haiku extracts
          items, Sonnet evaluates each item for keep/drop and a
          `meeting_minutes_filtered` artifact is written alongside
          the raw one. Default false — production behaviour is
          unchanged. The job summary records the cascade artifact path
          and the items_in / items_kept / items_dropped counts. The
          `--confirm-cost` half is always passed when this flag is
          true so the threshold gate never blocks a workflow-triggered
          run.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  debug-llm-extraction:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
      SOURCE_ID: ${{ github.event.inputs.source_id }}
      MAX_CHUNKS: ${{ github.event.inputs.max_chunks }}
      DEBUG_CHUNKS: ${{ github.event.inputs.debug_chunks }}
      PRINT_RAW_RESPONSE: ${{ github.event.inputs.print_raw_response }}
      MINIMAL_REPRO: ${{ github.event.inputs.minimal_repro }}
      DIFF_VS_OPUS: ${{ github.event.inputs.diff_vs_opus }}
      TEST_PARSER_ONLY: ${{ github.event.inputs.test_parser_only }}
      SINGLE_CHUNK: ${{ github.event.inputs.single_chunk }}
      PRINT_CONTEXT: ${{ github.event.inputs.print_context }}
      MODEL: ${{ github.event.inputs.model }}
      CASCADE_FILTER: ${{ github.event.inputs.cascade_filter }}
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Run meeting-minutes-llm in isolation
        id: run_llm
        run: |
          set +e
          MAX_CHUNKS_ARG=()
          if [ -n "${MAX_CHUNKS}" ]; then
            MAX_CHUNKS_ARG=(--max-chunks "${MAX_CHUNKS}")
          fi
          DEBUG_CHUNKS_ARG=()
          if [ "${DEBUG_CHUNKS}" = "true" ]; then
            DEBUG_CHUNKS_ARG=(--debug-chunks)
          fi
          EXTRA_ARGS=()
          [ "${PRINT_RAW_RESPONSE}" = "true" ] && EXTRA_ARGS+=(--print-raw-response)
          [ "${MINIMAL_REPRO}"      = "true" ] && EXTRA_ARGS+=(--minimal-repro)
          [ "${DIFF_VS_OPUS}"       = "true" ] && EXTRA_ARGS+=(--diff-vs-opus)
          [ "${TEST_PARSER_ONLY}"   = "true" ] && EXTRA_ARGS+=(--test-parser-only)
          SINGLE_CHUNK_ARG=()
          if [ "${SINGLE_CHUNK}" = "true" ]; then
            SINGLE_CHUNK_ARG=(--single-chunk)
          fi
          PRINT_CONTEXT_ARG=()
          if [ "${PRINT_CONTEXT}" = "true" ]; then
            PRINT_CONTEXT_ARG=(--print-context)
          fi
          # Phase 5: --model is the controlled override; default `haiku`
          # is byte-identical to pre-Phase-5 behaviour. The CLI HALTS on
          # an unknown token, so the choice dropdown above is the only
          # source of authority here.
          MODEL_ARG=()
          if [ -n "${MODEL}" ]; then
            MODEL_ARG=(--model "${MODEL}")
          fi
          # Phase 6 — Stage 2 cascade. Always pair with --confirm-cost
          # when enabled so the workflow-triggered run never blocks on
          # the per-source threshold gate (an interactive operator can
          # still gate manually by leaving the workflow input false).
          CASCADE_ARG=()
          if [ "${CASCADE_FILTER}" = "true" ]; then
            CASCADE_ARG=(--enable-cascade-filter --confirm-cost)
          fi
          python -m spectrum_systems_core.cli meeting-minutes-llm \
            --source-id "${SOURCE_ID}" \
            --data-lake "${DATA_LAKE_PATH}" \
            "${MAX_CHUNKS_ARG[@]}" \
            "${DEBUG_CHUNKS_ARG[@]}" \
            "${EXTRA_ARGS[@]}" \
            "${SINGLE_CHUNK_ARG[@]}" \
            "${PRINT_CONTEXT_ARG[@]}" \
            "${MODEL_ARG[@]}" \
            "${CASCADE_ARG[@]}" \
            >stdout.log 2>stderr.log
          rc=$?
          cat stdout.log
          cat stderr.log >&2
          if [ "${rc}" -eq 0 ]; then
            # The CLI prints the absolute artifact path on the success
            # line ("... OK produced_by=... written=<path>") ONLY when
            # a promoted artifact was actually written
            # (cli.py:3074-3082). Observe-only / blocked / halted runs
            # never emit a ``written=`` token, so an empty match is the
            # precise "nothing to push" signal.
            WRITTEN_PATH="$(grep -oE 'written=[^[:space:]]+' stdout.log \
              | tail -n1 | sed 's/^written=//')"
            # Push ONLY a full, non-diagnostic promotion. max_chunks /
            # single_chunk produce a truncated artifact; pushing it
            # would mutate the meaning of the append-only data-lake
            # (a partial meeting_minutes downstream consumers would
            # treat as real). Diagnostic modes write no artifact at all.
            SHOULD_PUSH=false
            if [ -n "${WRITTEN_PATH}" ] \
               && [ -z "${MAX_CHUNKS}" ] \
               && [ "${SINGLE_CHUNK}" != "true" ] \
               && [ "${PRINT_RAW_RESPONSE}" != "true" ] \
               && [ "${MINIMAL_REPRO}" != "true" ] \
               && [ "${DIFF_VS_OPUS}" != "true" ] \
               && [ "${TEST_PARSER_ONLY}" != "true" ]; then
              SHOULD_PUSH=true
            fi
            {
              echo "written_path=${WRITTEN_PATH}"
              echo "should_push=${SHOULD_PUSH}"
            } >> "${GITHUB_OUTPUT}"
            # Phase 6 — record the cascade artifact path (if any) so the
            # summary shows BOTH artifacts and the keep/drop counts.
            # The CLI prints a `CASCADE OK ... filtered_written=<path>`
            # line ONLY when --enable-cascade-filter ran successfully.
            CASCADE_PATH=""
            CASCADE_SUMMARY_LINE=""
            if [ "${CASCADE_FILTER}" = "true" ]; then
              CASCADE_PATH="$(grep -oE 'filtered_written=[^[:space:]]+' stdout.log \
                | tail -n1 | sed 's/^filtered_written=//')"
              CASCADE_SUMMARY_LINE="$(grep -E '^[^:]*\] CASCADE OK ' stdout.log | tail -n1)"
            fi
            {
              echo "## PROMOTED OK"
              echo ""
              echo "- written: \`${WRITTEN_PATH:-(no artifact written)}\`"
              echo "- push to data-lake: \`${SHOULD_PUSH}\`"
              if [ "${SHOULD_PUSH}" != "true" ] && [ -n "${WRITTEN_PATH}" ]; then
                echo "- (debug/partial mode — artifact intentionally" \
                     "NOT pushed to the append-only data-lake)"
              fi
              if [ -n "${CASCADE_PATH}" ]; then
                echo ""
                echo "### Stage 2 cascade (Phase 6)"
                echo "- filtered artifact: \`${CASCADE_PATH}\`"
                if [ -n "${CASCADE_SUMMARY_LINE}" ]; then
                  echo "- counts: \`${CASCADE_SUMMARY_LINE}\`"
                fi
              fi
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi
          {
            echo "## meeting-minutes-llm FAILED (exit ${rc})"
            echo ""
            echo "### reason_codes"
            echo '```'
            # The CLI prints the reason_code(s) on the BLOCKED line
            # (exit 1) or the pre-run-halt line (exit 2) to stdout.
            grep -iE 'reason_codes?=' stdout.log stderr.log \
              || echo "(no reason_code line emitted)"
            echo '```'
            echo ""
            echo "### stderr (first 2000 chars)"
            echo '```'
            head -c 2000 stderr.log
            echo ""
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
          exit 1

      # ------------------------------------------------------------------
      # The missing persistence path. nicklasorte/data-lake bulk-ignores
      # ``processed/``; ``git add`` of a path under it is a SILENT no-op
      # unless the directory chain AND the file are re-included first.
      # This mirrors the established
      # ``!**/processed/**/source_record.json`` precedent and the
      # identical step in validate-and-baseline.yml. Idempotent.
      # ------------------------------------------------------------------
      - name: Ensure data-lake .gitignore negates the meeting_minutes artifact
        if: ${{ steps.run_llm.outputs.should_push == 'true' }}
        env:
          CLONE_PATH: ${{ github.workspace }}/data-lake
        run: |
          set -euo pipefail
          GI="$CLONE_PATH/.gitignore"
          touch "$GI"
          add_rule() {
            grep -qxF "$1" "$GI" || printf '%s\n' "$1" >> "$GI"
          }
          add_rule '!**/processed/**/'
          add_rule '!**/processed/**/meeting_minutes__*.json'
          echo "Ensured meeting_minutes__*.json negation in data-lake .gitignore"

      # ------------------------------------------------------------------
      # Commit + push the promoted artifact to nicklasorte/data-lake via
      # the shared composite action (retry-with-backoff, never pushes to
      # spectrum-systems-core). The literal skip-ci marker in the commit
      # message is the data-lake commit's marker and MUST appear here in
      # the calling workflow per the push-data-lake action contract.
      # ------------------------------------------------------------------
      - name: Push meeting_minutes_llm artifact to nicklasorte/data-lake
        if: ${{ steps.run_llm.outputs.should_push == 'true' }}
        uses: ./.github/actions/push-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}
          commit_message: >-
            feat(llm-extraction): meeting_minutes_llm artifact for ${{ env.SOURCE_ID }} (debug-llm-extraction) [skip ci]
          add_paths: |
            .gitignore
            store/processed/meetings/${{ env.SOURCE_ID }}/meeting_minutes__*.json

      # ------------------------------------------------------------------
      # Verification (non-negotiable): re-fetch origin/main AFTER the
      # push and assert the exact artifact path the CLI reported is a
      # real blob in the pushed remote ref. This reads the remote, not
      # the runner's working tree, so it catches a silently-skipped
      # ``git add`` (the original failure mode) instead of reporting a
      # false success. Fail-closed: a missing blob fails the job.
      # ------------------------------------------------------------------
      - name: Verify artifact landed in remote data-lake
        if: ${{ steps.run_llm.outputs.should_push == 'true' }}
        env:
          CLONE_PATH: ${{ github.workspace }}/data-lake
          WRITTEN_PATH: ${{ steps.run_llm.outputs.written_path }}
        run: |
          set -euo pipefail
          cd "$CLONE_PATH"
          REL="${WRITTEN_PATH#${CLONE_PATH}/}"
          if [ "$REL" = "$WRITTEN_PATH" ] || [ -z "$REL" ]; then
            echo "::error::could not derive a data-lake-relative path from" \
                 "WRITTEN_PATH='${WRITTEN_PATH}' (clone='${CLONE_PATH}')"
            exit 1
          fi
          echo "Verifying remote path: $REL"
          git fetch origin main
          REMOTE_SHA="$(git rev-parse origin/main)"
          if ! git cat-file -e "origin/main:${REL}" 2>/dev/null; then
            echo "::error::artifact NOT found in nicklasorte/data-lake" \
                 "origin/main at ${REL} (commit ${REMOTE_SHA}). The push" \
                 "did not persist the promoted artifact."
            exit 1
          fi
          BYTES="$(git cat-file -s "origin/main:${REL}")"
          if [ "${BYTES}" -le 0 ]; then
            echo "::error::artifact ${REL} present but empty in" \
                 "origin/main (commit ${REMOTE_SHA})"
            exit 1
          fi
          echo "OK: ${REL} present in nicklasorte/data-lake @ ${REMOTE_SHA} (${BYTES} bytes)"
          {
            echo "## Data-lake push verified"
            echo ""
            echo "- path: \`${REL}\`"
            echo "- remote commit: \`${REMOTE_SHA}\`"
            echo "- size: ${BYTES} bytes"
          } >> "${GITHUB_STEP_SUMMARY}"
