name: Data lake cleanup

# Post-migration: clones nicklasorte/data-lake to scan / clean
# spurious records, and pushes the cleanup back there.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (show what would change without moving files)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

jobs:
  cleanup-data-lake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Show planned changes (dry run)
        env:
          DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
          SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
        run: |
          python scripts/cleanup_data_lake.py \
            --data-lake ${{ github.workspace }}/data-lake \
            --schema-dir ${{ github.workspace }}/contracts/schemas \
            --dry-run

      - name: Run cleanup
        if: ${{ github.event.inputs.dry_run == 'false' }}
        env:
          DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
          SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
        run: |
          python scripts/cleanup_data_lake.py \
            --data-lake ${{ github.workspace }}/data-lake \
            --schema-dir ${{ github.workspace }}/contracts/schemas

      - name: Push cleanup to nicklasorte/data-lake
        if: ${{ github.event.inputs.dry_run == 'false' }}
        uses: ./.github/actions/push-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}
          commit_message: >-
            chore: data-lake cleanup -- retire spurious records, add missing
            evals (run ${{ github.run_id }}) [skip ci]
          add_paths: |
            store/artifacts/
