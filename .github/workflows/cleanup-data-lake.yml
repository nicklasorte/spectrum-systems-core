name: Data lake cleanup

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (show what would change without moving files)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

jobs:
  cleanup-data-lake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Show planned changes (dry run)
        env:
          DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
          SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
        run: |
          python scripts/cleanup_data_lake.py \
            --data-lake ${{ github.workspace }}/data-lake \
            --schema-dir ${{ github.workspace }}/contracts/schemas \
            --dry-run

      - name: Run cleanup
        if: ${{ github.event.inputs.dry_run == 'false' }}
        env:
          DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
          SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
        run: |
          python scripts/cleanup_data_lake.py \
            --data-lake ${{ github.workspace }}/data-lake \
            --schema-dir ${{ github.workspace }}/contracts/schemas

      - name: Commit cleanup back to data-lake
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          cd "${{ github.workspace }}/data-lake"
          git config user.name "spectrum-pipeline[bot]"
          git config user.email "spectrum-pipeline[bot]@users.noreply.github.com"
          git add store/artifacts/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: data-lake cleanup — retire spurious records, add missing evals

          Retired: minutes files misprocessed as transcripts
          Added: missing ingestion evals for early-run transcripts
          Workflow run: ${{ github.run_id }}"
            git push
          fi
