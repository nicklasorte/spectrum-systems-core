name: Extraction Smoke Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Checkout data-lake
        uses: actions/checkout@v4
        with:
          repository: nicklasorte/data-lake
          path: data-lake
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run extraction smoke test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
          SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
        run: |
          python -m spectrum_systems_core.cli extract-typed \
            --source-id 7-ghz-downlink-tig-meeting---transcript-2-19-26 \
            --data-lake "${{ github.workspace }}/data-lake" \
            --force

      - name: Assert extractions produced
        env:
          DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
          SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
        run: |
          python - <<'EOF'
          import json, sys, pathlib, os

          data_lake = pathlib.Path(os.environ["DATA_LAKE_PATH"])
          sdl_root = pathlib.Path(os.environ["SDL_ROOT"])
          source_id = "7-ghz-downlink-tig-meeting---transcript-2-19-26"

          # The typed-extraction runner writes to:
          #   <SDL_ROOT>/extractions/<source_artifact_id>_meeting_extraction.json
          # where source_artifact_id is a UUID resolved from the source_record.
          # Mirror the orchestrator's _meeting_extraction_exists lookup.
          extractions_dir = sdl_root / "extractions"
          processed_dir = data_lake / "store" / "processed"

          if not extractions_dir.is_dir():
              print(f"SMOKE TEST FAILED: extractions dir missing: {extractions_dir}")
              sys.exit(1)

          source_artifact_id = ""
          for record_path in processed_dir.glob(f"*/{source_id}/source_record.json"):
              try:
                  rec = json.loads(record_path.read_text(encoding="utf-8"))
              except (OSError, json.JSONDecodeError):
                  continue
              aid = rec.get("artifact_id", "") if isinstance(rec, dict) else ""
              if isinstance(aid, str) and aid:
                  source_artifact_id = aid
                  break

          artifact_path = None
          if source_artifact_id:
              candidate = extractions_dir / f"{source_artifact_id}_meeting_extraction.json"
              if candidate.is_file():
                  artifact_path = candidate

          if artifact_path is None:
              direct = extractions_dir / f"{source_id}_meeting_extraction.json"
              if direct.is_file():
                  artifact_path = direct

          if artifact_path is None:
              for path in extractions_dir.glob("*_meeting_extraction.json"):
                  try:
                      obj = json.loads(path.read_text(encoding="utf-8"))
                  except (OSError, json.JSONDecodeError):
                      continue
                  if not isinstance(obj, dict):
                      continue
                  if obj.get("source_id") == source_id:
                      artifact_path = path
                      break
                  if (
                      source_artifact_id
                      and obj.get("source_artifact_id") == source_artifact_id
                  ):
                      artifact_path = path
                      break

          if artifact_path is None:
              print("SMOKE TEST FAILED: No meeting_extraction artifact found")
              print(f"Searched: {extractions_dir}")
              print(f"source_id={source_id}")
              print(f"source_artifact_id={source_artifact_id or '<unresolved>'}")
              print("Directory contents:")
              for p in sorted(extractions_dir.iterdir()) if extractions_dir.is_dir() else []:
                  print(f"  {p.name}")
              sys.exit(1)

          artifact = json.loads(artifact_path.read_text())
          print(f"Found artifact: {artifact_path.name}")

          decisions = len(artifact.get("decisions", []))
          claims = len(artifact.get("claims", []))
          action_items = len(artifact.get("action_items", []))
          total = decisions + claims + action_items

          print(f"Smoke test results for {source_id}:")
          print(f"  decisions={decisions} claims={claims} action_items={action_items}")

          if total == 0:
              print("")
              print("SMOKE TEST FAILED: Zero extractions produced.")
              print("The ChunkClassifier may be classifying all chunks as off_topic.")
              print("The extraction prompts may not be reaching the LLM.")
              print("Debug: check extract-typed logs above for warnings.")
              sys.exit(1)

          # Warn if routing quality warning fired
          off_topic = artifact.get("off_topic_count", 0)
          total_chunks = artifact.get("total_chunks_classified", 1)
          off_topic_rate = off_topic / total_chunks if total_chunks > 0 else 0

          if off_topic_rate > 0.80:
              print(f"WARNING: off_topic_rate={off_topic_rate:.2f} - classifier may be broken")
              print("All extractions zero or near-zero. Check ChunkClassifier.")
              sys.exit(1)

          print(f"  off_topic_rate={off_topic_rate:.2f}")
          print("SMOKE TEST PASSED")
          EOF
