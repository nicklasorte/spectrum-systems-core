name: Extraction Smoke Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install anthropic  # explicit safety net

      - name: Run CI automated checks
        run: |
          python -m pytest tests/ci/ -v --tb=short
        # All checks are filesystem scans -- fast, no API calls.
        # Fails the PR immediately if deprecated models, invalid YAML,
        # legacy artifact_kind in schemas, or hardcoded model strings
        # in workflows are introduced.

      - name: Verify smoke-test workflow has no path filter (Class 6)
        # Self-check: fail if smoke-test.yml introduces a pull_request
        # path filter. Runs IN the smoke workflow so it always fires --
        # if a path filter is present and somehow allowed the workflow
        # to run, this still catches it.
        run: |
          python -m spectrum_systems_core.health.smoke_filter \
            --repo-root "${{ github.workspace }}"

      - name: Fixture smoke test (fast, no data-lake)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/smoke_test_fixture.py
        # Runs in < 15 seconds. Fails fast if extractor stack is broken.
        # If this fails, skip the slower data-lake test.

      - name: Run extraction smoke test (real data, max 20 chunks)
        if: success()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
          SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
        run: |
          python -m spectrum_systems_core.cli extract-typed \
            --source-id 7-ghz-downlink-tig-meeting-kickoff---transcript-20251218 \
            --data-lake "${{ github.workspace }}/data-lake" \
            --force \
            --max-chunks 20
