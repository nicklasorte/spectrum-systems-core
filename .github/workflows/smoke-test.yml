name: Extraction Smoke Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Checkout data-lake
        uses: actions/checkout@v4
        with:
          repository: nicklasorte/data-lake
          path: data-lake
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run extraction smoke test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
          SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
        run: |
          python - <<'EOF'
          import json, sys, pathlib, os
          from spectrum_systems_core.extraction.typed_extraction_runner import (
              run_typed_extraction,
          )

          source_id = "7-ghz-downlink-tig-meeting---transcript-2-19-26"
          data_lake = os.environ["DATA_LAKE_PATH"]

          result = run_typed_extraction(
              source_id, data_lake=data_lake, force=True,
          )
          status = result.get("status", "")
          print(f"extract-typed result: {json.dumps(result, indent=2, default=str)}")

          if status != "success":
              print("")
              print(f"SMOKE TEST FAILED: extract-typed status={status!r}")
              print(f"reason: {result.get('reason', '<no reason>')}")
              processed_dir = pathlib.Path(data_lake) / "store" / "processed"
              chunks = list(processed_dir.glob(
                  f"*/{source_id}/stories/chunks.jsonl"
              ))
              record = list(processed_dir.glob(
                  f"*/{source_id}/source_record.json"
              ))
              print(f"chunks.jsonl found at: {[str(p) for p in chunks] or '<none>'}")
              print(f"source_record.json found at: {[str(p) for p in record] or '<none>'}")
              sys.exit(1)

          artifact_path = pathlib.Path(result["path"])
          if not artifact_path.is_file():
              print(f"SMOKE TEST FAILED: runner reported success but artifact missing at {artifact_path}")
              sys.exit(1)

          artifact = json.loads(artifact_path.read_text())
          decisions = len(artifact.get("decisions", []))
          claims = len(artifact.get("claims", []))
          action_items = len(artifact.get("action_items", []))
          total = decisions + claims + action_items

          print(f"")
          print(f"Smoke test results for {source_id}:")
          print(f"  decisions={decisions} claims={claims} action_items={action_items}")

          if total == 0:
              print("")
              print("SMOKE TEST FAILED: Zero extractions produced.")
              print("The ChunkClassifier may be classifying all chunks as off_topic.")
              print("The extraction prompts may not be reaching the LLM.")
              sys.exit(1)

          off_topic = artifact.get("off_topic_count", 0)
          total_chunks = artifact.get("total_chunks_classified", 1)
          off_topic_rate = off_topic / total_chunks if total_chunks > 0 else 0

          if off_topic_rate > 0.80:
              print(f"WARNING: off_topic_rate={off_topic_rate:.2f} - classifier may be broken")
              print("All extractions zero or near-zero. Check ChunkClassifier.")
              sys.exit(1)

          print(f"  off_topic_rate={off_topic_rate:.2f}")
          print("SMOKE TEST PASSED")
          EOF
