name: Run pipeline

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (scan and report, do not process)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force:
        description: 'Force re-process all transcripts through all pipeline stages'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force_only_missing:
        description: 'When combined with force=true, skip source_ids that already have a meeting_extraction artifact'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      specific_source_id:
        description: 'Process only this source_id (optional; overrides force_only_missing)'
        required: false
        default: ''
  repository_dispatch:
    types: [transcript-added]

permissions:
  contents: read

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
      SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Checkout data-lake
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.DATA_LAKE_REPO }}
          token: ${{ secrets.GH_PAT }}
          path: data-lake

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install anthropic  # explicit safety net

      - name: Pre-flight verification
        if: ${{ github.event.inputs.force == 'true' || github.event.inputs.force_only_missing == 'true' }}
        env:
          DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
          SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
        run: |
          # Fresh verify-pipeline-state (do not pollute data-lake with an
          # intermediate verification record on every pipeline trigger).
          python -m spectrum_systems_core.cli verify-pipeline-state \
            --data-lake "${{ github.workspace }}/data-lake" \
            --no-write-artifact

          # Block force-run if migration incomplete or ingestion empty.
          python -m spectrum_systems_core.cli check-preflight \
            --data-lake "${{ github.workspace }}/data-lake"

      - name: Run the pipeline
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          FOM_FLAG=""
          if [ "${{ github.event.inputs.force_only_missing }}" = "true" ]; then
            FOM_FLAG="--force-only-missing"
          fi
          SSID_FLAG=""
          if [ -n "${{ github.event.inputs.specific_source_id }}" ]; then
            SSID_FLAG="--specific-source-id ${{ github.event.inputs.specific_source_id }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m spectrum_systems_core.cli run-pipeline --dry-run \
              $FORCE_FLAG $FOM_FLAG $SSID_FLAG \
              --data-lake "${{ github.workspace }}/data-lake"
          else
            python -m spectrum_systems_core.cli run-pipeline \
              $FORCE_FLAG $FOM_FLAG $SSID_FLAG \
              --data-lake "${{ github.workspace }}/data-lake"
          fi

      - name: Run typed extraction (Phase M3)
        if: github.event.inputs.dry_run != 'true'
        env:
          DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
          SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
        run: |
          python -m spectrum_systems_core.cli extract-typed --all \
            --data-lake "${{ github.workspace }}/data-lake" \
            || echo "extract-typed completed with warnings"

      - name: Baseline reminder
        if: github.event.inputs.dry_run != 'true'
        run: |
          echo "::notice::Phase M3.2 baseline is NOT set automatically."
          echo "After reviewing the first eval_summary, a human must run:"
          echo "  python -m spectrum_systems_core.cli eval-ground-truth --set-baseline"
          echo "to establish the regression baseline."

      - name: Link ground truth pairs (minutes + transcripts)
        env:
          DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
          SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
        run: |
          python -m spectrum_systems_core.cli link-ground-truth \
            --process-minutes \
            --deduplicate \
            --data-lake "${{ github.workspace }}/data-lake" || echo "link-ground-truth completed with warnings"

      - name: Commit and push artifacts to data-lake
        if: github.event.inputs.dry_run != 'true'
        run: |
          cd "${{ github.workspace }}/data-lake"
          git config user.name "spectrum-pipeline[bot]"
          git config user.email "spectrum-pipeline[bot]@users.noreply.github.com"
          git add store/artifacts/ store/processed/ store/raw/
          if git diff --staged --quiet; then
            echo "No new artifacts to commit."
          else
            git commit -m "pipeline: add artifacts from run $(date -u +%Y-%m-%dT%H:%M:%SZ)

          Triggered by: ${{ github.event_name }}
          Run ID: ${{ github.run_id }}
          Workflow: ${{ github.workflow }}"
            git push
          fi
