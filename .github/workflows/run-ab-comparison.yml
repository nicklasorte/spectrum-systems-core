name: Run A/B Comparison (Phase 5 variants)

# Phase 5 A/B comparison workflow.
#
# Reads up to four existing meeting_minutes artifacts (baseline + A +
# B + C) for one source_id and produces a single ``ab_comparison``
# artifact summarising each variant's grounding gate health, F1 vs
# Opus, F1 vs human minutes (when the human gold-standard parser is
# wired up), and per-metric winner.
#
# Inputs (all optional except source_id):
#   - source_id           — transcript slug
#   - run_id_baseline     — run_id of the pre-Variant-A extraction (or empty)
#   - run_id_variant_a    — run_id of the Variant A extraction (or empty)
#   - run_id_variant_b    — run_id of the Variant B (segmented) extraction
#   - run_id_variant_c    — run_id of the Variant C (templated) extraction
#
# Every variant input is optional; the artifact handles the missing
# rows as ``null`` and the winner picker skips them rather than
# treating absence as zero.

on:
  workflow_dispatch:
    inputs:
      source_id:
        description: 'Source ID to compare'
        required: true
        default: '7-ghz-downlink-tig-meeting-kickoff---transcript-20251218'
      run_id_baseline:
        description: 'run_id for the baseline (pre-Variant) extraction (optional)'
        required: false
        default: ''
      run_id_variant_a:
        description: 'run_id for Variant A — source_chunk_id (optional)'
        required: false
        default: ''
      run_id_variant_b:
        description: 'run_id for Variant B — topic segmentation (optional)'
        required: false
        default: ''
      run_id_variant_c:
        description: 'run_id for Variant C — meeting-type templates (optional)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  run-ab-comparison:
    runs-on: ubuntu-latest
    env:
      SOURCE_ID: ${{ github.event.inputs.source_id }}
      RUN_ID_BASELINE: ${{ github.event.inputs.run_id_baseline }}
      RUN_ID_VARIANT_A: ${{ github.event.inputs.run_id_variant_a }}
      RUN_ID_VARIANT_B: ${{ github.event.inputs.run_id_variant_b }}
      RUN_ID_VARIANT_C: ${{ github.event.inputs.run_id_variant_c }}
      DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Build ab_comparison artifact
        id: build_ab
        run: |
          set -euo pipefail
          python scripts/build_ab_comparison.py \
            --data-lake "${DATA_LAKE_PATH}" \
            --source-id "${SOURCE_ID}" \
            --run-id-baseline "${RUN_ID_BASELINE}" \
            --run-id-variant-a "${RUN_ID_VARIANT_A}" \
            --run-id-variant-b "${RUN_ID_VARIANT_B}" \
            --run-id-variant-c "${RUN_ID_VARIANT_C}" \
            --out /tmp/ab_comparison.json
          # Copy into the data-lake comparisons subdir so the existing
          # push step can pick it up without inventing a new path.
          TS="$(date -u +%Y%m%dT%H%M%SZ)"
          DEST_DIR="${DATA_LAKE_PATH}/store/processed/meetings/${SOURCE_ID}/comparisons"
          mkdir -p "${DEST_DIR}"
          DEST="${DEST_DIR}/ab_comparison__${TS}.json"
          cp /tmp/ab_comparison.json "${DEST}"
          echo "ab_artifact_path=${DEST}" >> "${GITHUB_OUTPUT}"

      - name: Ensure data-lake .gitignore negation
        env:
          CLONE_PATH: ${{ github.workspace }}/data-lake
        run: |
          set -euo pipefail
          GI="$CLONE_PATH/.gitignore"
          touch "$GI"
          add_rule() {
            grep -qxF "$1" "$GI" || printf '%s\n' "$1" >> "$GI"
          }
          add_rule '!**/processed/**/'
          add_rule '!**/processed/**/comparisons/'
          add_rule '!**/processed/**/comparisons/ab_comparison__*.json'
          echo "Ensured ab_comparison__*.json negation in data-lake .gitignore"

      - name: Push ab_comparison artifact to nicklasorte/data-lake
        uses: ./.github/actions/push-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}
          commit_message: >-
            feat(ab-comparison): Phase 5 A/B artifact for ${{ env.SOURCE_ID }} [skip ci]
          add_paths: |
            .gitignore
            store/processed/meetings/${{ env.SOURCE_ID }}/comparisons/ab_comparison__*.json

      - name: Post summary table
        if: always()
        run: |
          python - <<'EOF'
          import json
          import os
          import pathlib

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
          p = pathlib.Path("/tmp/ab_comparison.json")
          with open(summary_path, "a") as f:
              f.write("## Phase 5 A/B Variant Comparison\n\n")
              if not p.is_file() or not p.read_text().strip():
                  f.write("No A/B artifact produced (script halted; see log).\n")
                  raise SystemExit(0)
              data = json.loads(p.read_text())
              f.write(f"- source_id: `{data.get('source_id')}`\n\n")
              f.write("| variant | run_id | total | grounded | gate_drop | F1 vs Opus | precision | recall | F1 vs human |\n")
              f.write("|---|---|---|---|---|---|---|---|---|\n")
              for key in ("baseline", "variant_a", "variant_b", "variant_c"):
                  row = data["variants"].get(key)
                  if row is None:
                      f.write(f"| {key} | _not run_ | - | - | - | - | - | - | - |\n")
                      continue
                  f.write(
                      f"| {key} | `{row.get('run_id', '')}` | "
                      f"{row.get('total_items', '')} | "
                      f"{row.get('grounded_items', '')} | "
                      f"{row.get('gate_drop_rate', '')} | "
                      f"{row.get('f1_vs_opus', '')} | "
                      f"{row.get('precision_vs_opus', '')} | "
                      f"{row.get('recall_vs_opus', '')} | "
                      f"{row.get('f1_vs_human', '-')} |\n"
                  )
              winner = data.get("winner", {})
              f.write("\n### Winner per metric\n\n")
              for metric, var in winner.items():
                  f.write(f"- **{metric}**: `{var if var else 'n/a'}`\n")
          EOF
