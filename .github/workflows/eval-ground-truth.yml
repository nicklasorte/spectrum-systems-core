name: Eval ground truth

# Phase M.4. Runs after every successful `Run pipeline` workflow.
# Loads confirmed ground_truth_pair artifacts from the data lake,
# evaluates the pipeline output against them, writes alignment_result,
# eval_result, eval_summary, and gate_decision artifacts back into the
# data lake under store/artifacts/evals/, and commits.
#
# A 30-second wait before fetching the data lake gives the
# Run-pipeline workflow's push enough time to propagate so we are
# always evaluating the freshest artifacts. (TimeStampEval finding:
# stale artifacts produce false regressions.)

on:
  workflow_run:
    workflows: ["Run pipeline"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pipeline_run_id:
        description: 'Pipeline run ID to evaluate (optional)'
        required: false
        default: ''
      set_baseline:
        description: 'Write the current eval_summary as baseline'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

jobs:
  eval-ground-truth:
    runs-on: ubuntu-latest
    # Only run for successful pipeline completions; on workflow_dispatch
    # github.event.workflow_run is undefined and the conclusion check
    # short-circuits to true.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          github.event.workflow_run.conclusion == 'success' }}
    env:
      DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
      SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Checkout data-lake
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.DATA_LAKE_REPO }}
          token: ${{ secrets.GH_PAT }}
          path: data-lake

      - name: Wait for data-lake artifacts to propagate
        run: sleep 30

      - name: Detect upstream dry-run pipeline
        id: upstream
        # RT1 finding: an eval triggered after a dry-run pipeline must
        # not run. The CLI auto-detects this too, but workflow-level
        # detection is the first line of defense (it prevents the eval
        # job from churning through a useless install + run).
        # We check the most recently written orchestration_run_record
        # in the freshly-pulled data-lake; if it says dry_run==true the
        # downstream steps short-circuit via the `if:` guard.
        run: |
          set -eu
          ORCH_DIR="data-lake/store/artifacts/orchestration"
          if [ ! -d "$ORCH_DIR" ]; then
            echo "no orchestration dir; treating as non-dry-run"
            echo "is_dry_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LATEST=$(ls -t "$ORCH_DIR"/*.json 2>/dev/null | head -1)
          if [ -z "$LATEST" ]; then
            echo "no orchestration_run_record found; treating as non-dry-run"
            echo "is_dry_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DRY_RUN=$(python -c "import json,sys; d=json.load(open('$LATEST')); print('true' if d.get('dry_run') else 'false')")
          echo "latest orchestration record: $LATEST -> dry_run=$DRY_RUN"
          echo "is_dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"

      - name: Set up Python 3.11
        if: steps.upstream.outputs.is_dry_run != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.upstream.outputs.is_dry_run != 'true'
        run: pip install -e ".[dev]"

      - name: Run eval-ground-truth
        if: steps.upstream.outputs.is_dry_run != 'true'
        run: |
          SET_BASELINE_FLAG=""
          if [ "${{ github.event.inputs.set_baseline }}" = "true" ]; then
            SET_BASELINE_FLAG="--set-baseline"
          fi
          PIPELINE_RUN_ID_FLAG=""
          if [ -n "${{ github.event.inputs.pipeline_run_id }}" ]; then
            PIPELINE_RUN_ID_FLAG="--pipeline-run-id ${{ github.event.inputs.pipeline_run_id }}"
          fi
          python -m spectrum_systems_core.cli eval-ground-truth \
            $SET_BASELINE_FLAG $PIPELINE_RUN_ID_FLAG \
            --data-lake "${{ github.workspace }}/data-lake"

      - name: Commit eval results to data-lake
        if: steps.upstream.outputs.is_dry_run != 'true'
        run: |
          cd data-lake
          git config user.name "spectrum-pipeline[bot]"
          git config user.email "spectrum-pipeline[bot]@users.noreply.github.com"
          git add store/artifacts/evals/
          if git diff --staged --quiet; then
            echo "No eval results to commit."
          else
            git commit -m "chore: add eval results for pipeline run

          Workflow run: ${{ github.run_id }}"
            git push
          fi
