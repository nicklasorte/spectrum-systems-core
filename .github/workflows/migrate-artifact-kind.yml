name: migrate-artifact-kind

# One-time migration: add artifact_type alongside artifact_kind across
# the data lake. Manual trigger only. Defaults to dry-run; pass
# confirm: "yes" to commit changes back to nicklasorte/data-lake.
#
# Post-migration: this script operates on the cloned data-lake; the
# resulting commits are pushed directly to nicklasorte/data-lake
# (additive, never destructive).

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'yes' to APPLY changes (otherwise dry-run only)."
        required: false
        default: "no"

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core dependencies
        run: python -m pip install -e ".[dev]"

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Migration (dry-run, always first)
        run: |
          python scripts/migrate_artifact_kind.py \
            --data-lake "${{ github.workspace }}/data-lake" \
            --dry-run

      - name: Migration (apply changes)
        if: ${{ github.event.inputs.confirm == 'yes' }}
        run: |
          python scripts/migrate_artifact_kind.py \
            --data-lake "${{ github.workspace }}/data-lake" \
            --confirm

      - name: Push migration to nicklasorte/data-lake
        if: ${{ github.event.inputs.confirm == 'yes' }}
        uses: ./.github/actions/push-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}
          commit_message: >-
            chore: migrate artifact_kind -> artifact_type (additive, step 1 of 2) [skip ci]
          add_paths: |
            store/
