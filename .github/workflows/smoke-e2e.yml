name: Phase R smoke (e2e)

# Phase R resilience — runs on every PR. No API key, no live extraction.
#
# Asserts the bug classes Phase R was designed to prevent:
#   1. gitignored artifact paths (read by scripts/) — caught by the
#      gitignore audit against the data-lake repo's gitignore (when a
#      clone is present) plus the spectrum-systems-core data-lake/
#      separation rule.
#   2. workspace drift that breaks the preflight + few-shot selector
#      chain — caught by the e2e smoke test that exercises the real
#      scripts against a seeded temp data-lake.
#   3. dangling runbook references — caught by the runbook validator.
#
# Budgeted at <2 minutes wall clock. Clones nicklasorte/data-lake
# (read-only) so the manifest-vs-gitignore audit can see the real
# gitignore that owns the data-lake paths.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Evaluating ``secrets.X`` happens at the job-env scope (a
      # documented-safe place for the secrets context) and exposes a
      # non-empty marker the step-level ``if:`` can compare against
      # without touching the secrets context itself.
      DATA_LAKE_TOKEN_PRESENT: ${{ secrets.DATA_LAKE_TOKEN != '' && 'yes' || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone nicklasorte/data-lake (read-only)
        # Audit + smoke benefit from the real data-lake gitignore being
        # on disk. Token is optional here: when it's missing (e.g. a
        # forked PR), the audit falls back to verifying only the
        # spectrum-systems-core separation rule.
        if: env.DATA_LAKE_TOKEN_PRESENT == 'yes'
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Gitignore audit (manifest contract)
        # Pure-stdlib. Reads docs/architecture/artifact_manifest.md and
        # asserts (a) the data-lake/ rule is present in
        # spectrum-systems-core .gitignore, and (b) every git-tracked
        # data-lake path is un-ignored inside the data-lake repo (when
        # the clone is present).
        run: python scripts/_gitignore_audit.py

      - name: Runbook validator
        # Pure-stdlib. Asserts every workflow file referenced from
        # docs/runbooks/first_run.md still exists.
        run: python scripts/_validate_runbook.py

      - name: Install package with dev extras
        run: python -m pip install -e ".[dev]"

      - name: End-to-end pipeline smoke test
        # Uses tests/integration/fixtures.py factories — real merger,
        # mocked-by-construction model output, real scripts. No API
        # key required.
        run: python -m pytest tests/e2e/ -v --tb=short
