name: Debug single transcript

# Debug-only workflow. Runs the full pipeline + typed extraction against a
# single short transcript so a parse-failure regression can be reproduced in
# ~4 minutes instead of waiting on the 13-way parallel matrix in run-pipeline.
# Not part of the production pipeline chain; trigger manually with
# `workflow_dispatch` from the Actions tab.
#
# Data-lake architecture (post-migration): every workflow clones
# nicklasorte/data-lake into ./data-lake via DATA_LAKE_TOKEN. The
# transcript already lives in that repo under
# store/raw/transcripts/, so no fixture-seeding step is required.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug-single-transcript:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
      SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
      # Change this to debug a different transcript.
      SOURCE_ID: 7-ghz-downlink-tig-meeting-kickoff---transcript-20251218
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install anthropic

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Validate environment (Phase R)
        # Asserts data-lake/ is a clone of nicklasorte/data-lake,
        # ANTHROPIC_API_KEY is set, and every git-tracked artifact
        # path in the manifest is un-ignored. Fails fast (<1s) so a
        # misconfigured workspace cannot waste a 4-minute extraction.
        run: |
          python scripts/_env_validate.py --data-lake "$DATA_LAKE_PATH"

      - name: Verify transcript exists in data-lake
        # Post-migration, transcripts are NOT seeded from a repo
        # fixture; they live in nicklasorte/data-lake under
        # store/raw/transcripts/. Fail fast if the named transcript
        # is missing rather than producing a confusing empty run.
        run: |
          set -euo pipefail
          DEST_DIR="$DATA_LAKE_PATH/store/raw/transcripts"
          if [ ! -d "$DEST_DIR" ]; then
            echo "::error::transcripts directory missing at $DEST_DIR"
            exit 1
          fi
          # The pipeline orchestrator slugifies the filename when it
          # discovers transcripts (see pipeline_orchestrator._slugify),
          # so just confirm at least one .txt is present and that
          # SOURCE_ID maps to a slugifiable filename.
          ls -la "$DEST_DIR"
          MATCH=$(find "$DEST_DIR" -maxdepth 1 -name "*.txt" -print | head -20)
          if [ -z "$MATCH" ]; then
            echo "::error::no transcripts found in $DEST_DIR"
            exit 1
          fi

      - name: Run pipeline for single transcript
        run: |
          set -euo pipefail
          python -m spectrum_systems_core.cli run-pipeline \
            --force \
            --specific-source-id "$SOURCE_ID" \
            --data-lake "$DATA_LAKE_PATH"
          # Surface what the pipeline produced so a future no-op is
          # diagnosable from the workflow log alone (per CLAUDE.md
          # auto-debug rule).
          echo "--- post-pipeline data-lake state ---"
          find "$DATA_LAKE_PATH/store/raw" -maxdepth 4 -type f 2>/dev/null \
            || echo "  (no raw/ contents)"
          find "$DATA_LAKE_PATH/store/processed" -maxdepth 5 -type f 2>/dev/null \
            || echo "  (no processed/ contents)"
          CHUNKS="$DATA_LAKE_PATH/store/processed/meetings/$SOURCE_ID/stories/chunks.jsonl"
          if [ ! -f "$CHUNKS" ]; then
            echo "::error::Pipeline produced no chunks.jsonl at $CHUNKS"
            exit 1
          fi
          echo "chunks.jsonl line count: $(wc -l < "$CHUNKS")"

      - name: Run typed extraction for single transcript
        run: |
          python -m spectrum_systems_core.cli extract-typed \
            --source-id "$SOURCE_ID" \
            --data-lake "$DATA_LAKE_PATH" \
            --force

      - name: Generate GT pairs from extraction
        # Seeds the rubric-annotation pipeline: each decision in the
        # latest meeting_extraction becomes a ground_truth_pair under
        # data-lake/store/artifacts/ground_truth/<pair_id>.json. Without
        # this step the downstream annotate-gt-rubric workflow exits with
        # "source_id matched 0 pairs" because GroundTruthLinker only
        # writes pairs when a separate minutes_record exists to date-match
        # against — which this debug run does not produce.
        run: |
          python scripts/generate_gt_pairs.py \
            --source-id "$SOURCE_ID" \
            --data-lake "$DATA_LAKE_PATH"

      - name: Collect and display blocked artifacts
        id: collect
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          source_id = os.environ["SOURCE_ID"]
          data_lake = Path(os.environ["DATA_LAKE_PATH"])
          sdl_root = Path(os.environ["SDL_ROOT"])
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

          # Buckets correspond to the spec's reporting table. "other" is the
          # catch-all so we never lose a blocked artifact even if a new
          # block_reason prefix is introduced.
          CATEGORIES = (
              "json_parse_error",
              "rate_limit_exhausted",
              "empty_response",
              "other",
          )

          def categorize(reason: str) -> str:
              if not reason:
                  return "other"
              lowered = reason.lower()
              if "json_parse" in lowered or "parse_error" in lowered:
                  return "json_parse_error"
              if "rate_limit" in lowered:
                  return "rate_limit_exhausted"
              if "empty_response" in lowered or "empty response" in lowered:
                  return "empty_response"
              return "other"

          buckets: dict[str, list[dict]] = {c: [] for c in CATEGORIES}
          total_attempted = 0

          # 1. story-extractor blocked candidates: written to candidates.jsonl
          #    with status="blocked" and a block_reason field.
          processed_root = data_lake / "store" / "processed"
          if processed_root.is_dir():
              for family_dir in processed_root.iterdir():
                  source_dir = family_dir / source_id
                  if not source_dir.is_dir():
                      continue
                  chunks_path = source_dir / "stories" / "chunks.jsonl"
                  if chunks_path.is_file():
                      with chunks_path.open("r", encoding="utf-8") as fh:
                          for line in fh:
                              if line.strip():
                                  total_attempted += 1
                  candidates_path = source_dir / "stories" / "candidates.jsonl"
                  if not candidates_path.is_file():
                      continue
                  with candidates_path.open("r", encoding="utf-8") as fh:
                      for line in fh:
                          line = line.strip()
                          if not line:
                              continue
                          try:
                              record = json.loads(line)
                          except json.JSONDecodeError:
                              continue
                          if record.get("status") != "blocked":
                              continue
                          reason = str(record.get("block_reason", ""))
                          buckets[categorize(reason)].append({
                              "origin": str(candidates_path),
                              "record": record,
                          })

          # 2. typed-extraction failure artifacts: written to
          #    <sdl_root>/failures/<failure_id>.json. Filter to this source_id.
          failures_dir = sdl_root / "failures"
          FAILURE_TYPE_TO_CATEGORY = {
              "typed_extraction_llm_json_parse_failed": "json_parse_error",
              "api_rate_limit_exhausted": "rate_limit_exhausted",
              "extraction_empty_response": "empty_response",
              "typed_extraction_empty_result": "other",
          }
          if failures_dir.is_dir():
              for path in sorted(failures_dir.glob("*.json")):
                  try:
                      record = json.loads(path.read_text(encoding="utf-8"))
                  except (OSError, json.JSONDecodeError):
                      continue
                  if record.get("source_id") != source_id:
                      continue
                  artifact_type = str(record.get("artifact_type", ""))
                  category = FAILURE_TYPE_TO_CATEGORY.get(artifact_type, "other")
                  buckets[category].append({
                      "origin": str(path),
                      "record": record,
                  })

          total_blocked = sum(len(v) for v in buckets.values())

          def write_lines(lines):
              text = "\n".join(lines) + "\n"
              print(text, end="")
              with summary_path.open("a", encoding="utf-8") as fh:
                  fh.write(text)

          header = [
              "## Debug single transcript",
              "",
              f"- Source ID: `{source_id}`",
              f"- Total attempted: {total_attempted}",
              f"- Total blocked: {total_blocked}",
              "",
          ]

          if total_blocked == 0:
              header.append("[OK] No blocked chunks")
              write_lines(header)
          else:
              header.append(f"[WARN] {total_blocked} chunks blocked")
              header.append("")
              header.append("### Blocked Artifact Summary")
              header.append("")
              header.append("| block_reason | count |")
              header.append("| --- | ---: |")
              for cat in CATEGORIES:
                  header.append(f"| {cat} | {len(buckets[cat])} |")
              header.append(f"| **Total blocked** | **{total_blocked}** |")
              header.append(f"| **Total attempted** | **{total_attempted}** |")
              header.append("")
              write_lines(header)

          # Stdout banner (matches the format in the task spec).
          print("=== Blocked Artifact Summary ===")
          for cat in CATEGORIES:
              print(f"{cat:>22}: {len(buckets[cat])} chunks")
          print(f"Total blocked: {total_blocked} / Total attempted: {total_attempted}")
          print()

          # First 3 blocked artifacts in full per category.
          for cat in CATEGORIES:
              entries = buckets[cat]
              if not entries:
                  continue
              banner = f"--- First {min(3, len(entries))} blocked artifact(s): {cat} ---"
              print(banner)
              detail_block = [f"### Examples: `{cat}`", ""]
              for entry in entries[:3]:
                  pretty = json.dumps(entry["record"], indent=2, sort_keys=True)
                  print(f"# origin: {entry['origin']}")
                  print(pretty)
                  print()
                  detail_block.append(f"**origin:** `{entry['origin']}`")
                  detail_block.append("")
                  detail_block.append("```json")
                  detail_block.append(pretty)
                  detail_block.append("```")
                  detail_block.append("")
              with summary_path.open("a", encoding="utf-8") as fh:
                  fh.write("\n".join(detail_block) + "\n")
          PY

      - name: Push pipeline artifacts to nicklasorte/data-lake
        if: success()
        uses: ./.github/actions/push-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}
          commit_message: >-
            chore(pipeline): commit artifacts from debug run ${{ github.run_id }} [skip ci]
          add_paths: |
            store/artifacts/
            store/processed/
