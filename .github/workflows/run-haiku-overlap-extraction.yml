name: Run Haiku Extraction (chunk overlap=2)

# Phase 2.B: mirror of run-haiku-extraction.yml with the chunker
# overlap toggle ON (CHUNK_OVERLAP_TURNS=2). Produces a meeting_minutes
# artifact whose provenance carries
# chunking_strategy_version="speaker_turn_v1_overlap2", suitable for
# comparison ONLY against an Opus baseline produced under the same
# overlap setting (the comparison engine halts on a chunking-strategy
# mismatch — see scripts/compare_opus_haiku.py).
#
# Operator action: dispatch this workflow on the Dec 18 transcript
# AFTER producing a matched Opus baseline at overlap=2. Then dispatch
# run-comparison.yml against the resulting artifact. The PR hard gate
# is F1 >= 39.5% (no regression vs prior baseline of 39.5%).
#
# Persistence: identical to run-haiku-extraction.yml — uses the same
# clone-data-lake / push-data-lake composite actions, the same
# .gitignore negation for processed/**/meeting_minutes__*.json, and
# the same artifact-landed verification step.

on:
  workflow_dispatch:
    inputs:
      source_id:
        description: 'Source ID to extract'
        required: true
        default: '7-ghz-downlink-tig-meeting-kickoff---transcript-20251218'
      chunk_overlap_turns:
        description: 'Overlap turn count (default 2)'
        required: false
        default: '2'

permissions:
  contents: read

jobs:
  run-haiku-overlap:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
      SOURCE_ID: ${{ github.event.inputs.source_id }}
      # Phase 2.B: enable speaker-turn overlap on both chunkers.
      # The CLI does not read this directly; the chunker modules do.
      CHUNK_OVERLAP_TURNS: ${{ github.event.inputs.chunk_overlap_turns }}
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Run meeting-minutes-llm (haiku, overlap=${{ env.CHUNK_OVERLAP_TURNS }})
        id: run_llm
        run: |
          set +e
          python -m spectrum_systems_core.cli meeting-minutes-llm \
            --source-id "${SOURCE_ID}" \
            --data-lake "${DATA_LAKE_PATH}" \
            >stdout.log 2>stderr.log
          rc=$?
          cat stdout.log
          cat stderr.log >&2
          if [ "${rc}" -eq 0 ]; then
            WRITTEN_PATH="$(grep -oE 'written=[^[:space:]]+' stdout.log \
              | tail -n1 | sed 's/^written=//')"
            if [ -z "${WRITTEN_PATH}" ]; then
              {
                echo "## meeting-minutes-llm exited 0 but wrote no artifact"
                echo ""
                echo "stdout tail:"
                echo '```'
                tail -n 40 stdout.log
                echo '```'
              } >> "${GITHUB_STEP_SUMMARY}"
              exit 1
            fi
            echo "written_path=${WRITTEN_PATH}" >> "${GITHUB_OUTPUT}"
            echo "should_push=true" >> "${GITHUB_OUTPUT}"
            {
              echo "## PROMOTED OK (haiku, overlap=${CHUNK_OVERLAP_TURNS})"
              echo ""
              echo "- source_id: \`${SOURCE_ID}\`"
              echo "- model: \`haiku\`"
              echo "- chunk_overlap_turns: \`${CHUNK_OVERLAP_TURNS}\`"
              echo "- chunking_strategy_version: \`speaker_turn_v1_overlap${CHUNK_OVERLAP_TURNS}\`"
              echo "- written: \`${WRITTEN_PATH}\`"
              echo "- push to data-lake: \`true\`"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi
          {
            echo "## meeting-minutes-llm FAILED (exit ${rc})"
            echo ""
            echo "- source_id: \`${SOURCE_ID}\`"
            echo "- model: \`haiku\`"
            echo "- chunk_overlap_turns: \`${CHUNK_OVERLAP_TURNS}\`"
            echo ""
            echo "### reason_codes"
            echo '```'
            grep -iE 'reason_codes?=' stdout.log stderr.log \
              || echo "(no reason_code line emitted)"
            echo '```'
            echo ""
            echo "### stderr (first 2000 chars)"
            echo '```'
            head -c 2000 stderr.log
            echo ""
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
          exit 1

      # nicklasorte/data-lake bulk-ignores `processed/`; `git add` is a
      # silent no-op unless the directory chain AND the file are
      # re-included first. Mirrors run-haiku-extraction.yml.
      - name: Ensure data-lake .gitignore negates the meeting_minutes artifact
        if: ${{ steps.run_llm.outputs.should_push == 'true' }}
        env:
          CLONE_PATH: ${{ github.workspace }}/data-lake
        run: |
          set -euo pipefail
          GI="$CLONE_PATH/.gitignore"
          touch "$GI"
          add_rule() {
            grep -qxF "$1" "$GI" || printf '%s\n' "$1" >> "$GI"
          }
          add_rule '!**/processed/**/'
          add_rule '!**/processed/**/meeting_minutes__*.json'
          echo "Ensured meeting_minutes__*.json negation in data-lake .gitignore"

      - name: Push meeting_minutes_llm artifact to nicklasorte/data-lake
        if: ${{ steps.run_llm.outputs.should_push == 'true' }}
        uses: ./.github/actions/push-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}
          commit_message: >-
            feat(llm-extraction): meeting_minutes_llm haiku (overlap=${{ env.CHUNK_OVERLAP_TURNS }}) artifact for ${{ env.SOURCE_ID }} [skip ci]
          add_paths: |
            .gitignore
            store/processed/meetings/${{ env.SOURCE_ID }}/meeting_minutes__*.json

      - name: Verify artifact landed in remote data-lake
        if: ${{ steps.run_llm.outputs.should_push == 'true' }}
        env:
          CLONE_PATH: ${{ github.workspace }}/data-lake
          WRITTEN_PATH: ${{ steps.run_llm.outputs.written_path }}
        run: |
          set -euo pipefail
          cd "$CLONE_PATH"
          REL="${WRITTEN_PATH#${CLONE_PATH}/}"
          if [ "$REL" = "$WRITTEN_PATH" ] || [ -z "$REL" ]; then
            echo "::error::could not derive a data-lake-relative path from" \
                 "WRITTEN_PATH='${WRITTEN_PATH}' (clone='${CLONE_PATH}')"
            exit 1
          fi
          echo "Verifying remote path: $REL"
          git fetch origin main
          REMOTE_SHA="$(git rev-parse origin/main)"
          if ! git cat-file -e "origin/main:${REL}" 2>/dev/null; then
            echo "::error::artifact NOT found in nicklasorte/data-lake" \
                 "origin/main at ${REL} (commit ${REMOTE_SHA}). The push" \
                 "did not persist the promoted artifact."
            exit 1
          fi
          BYTES="$(git cat-file -s "origin/main:${REL}")"
          if [ "${BYTES}" -le 0 ]; then
            echo "::error::artifact ${REL} present but empty in" \
                 "origin/main (commit ${REMOTE_SHA})"
            exit 1
          fi
          echo "OK: ${REL} present in nicklasorte/data-lake @ ${REMOTE_SHA} (${BYTES} bytes)"
          {
            echo "## Data-lake push verified"
            echo ""
            echo "- path: \`${REL}\`"
            echo "- remote commit: \`${REMOTE_SHA}\`"
            echo "- size: ${BYTES} bytes"
          } >> "${GITHUB_STEP_SUMMARY}"
