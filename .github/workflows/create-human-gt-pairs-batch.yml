name: Create human-authored GT pairs (BATCH — all transcripts w/ minutes)

# Scales the single-transcript create-human-gt-pairs workflow to EVERY
# ingested transcript that has a matching human-authored minutes .docx
# in nicklasorte/data-lake.
#
# Non-circularity is preserved: scripts/_match_minutes_transcripts.py
# only lists ingested transcripts (dirs with source_record.json) and the
# store/raw/minutes/*.docx files, then pairs them by date token. For
# each matched pair scripts/create_human_gt_pairs.py extracts decisions /
# action_items / claims directly from the minutes .docx (NEVER from
# pipeline output) using Claude Sonnet 4 (claude-sonnet-4-6 — the
# non-deprecated id the binding model-string CI gate maps the dated
# Sonnet 4 alias to; same Sonnet 4 generation, NOT the Haiku extraction
# default).
#
# All pairs are committed to nicklasorte/data-lake in ONE commit at the
# end via the push-data-lake composite action (not one commit per
# transcript).
#
# dry_run defaults TRUE: the first run prints the match table and the
# per-transcript pair counts WITHOUT writing or committing anything.
#
# skip_existing defaults TRUE: any source_id that already has
# store/processed/meetings/<id>/ground_truth/human_minutes_gt_pairs.jsonl
# is skipped (the Dec 18 transcript is already done).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run: print match table + extract pairs, do NOT write/commit'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      skip_existing:
        description: 'Skip source_ids that already have human_minutes_gt_pairs.jsonl'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

jobs:
  batch-create-human-gt-pairs:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
      SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install anthropic  # explicit safety net

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Ensure data-lake .gitignore un-ignores GT pairs (general pattern)
        # The data-lake repo bulk-ignores **/processed/**. For ANY
        # source_id's human_minutes_gt_pairs.jsonl to land it needs the
        # GENERAL negation (not a Dec-18-specific one), mirroring the
        # proven !**/processed/**/source_record.json precedent. Idempotent:
        # only appends when the exact general line is absent. Committed in
        # the SAME single commit as the pairs (added to push add_paths).
        run: |
          set -euo pipefail
          GI="${{ github.workspace }}/data-lake/.gitignore"
          LINE='!**/processed/**/ground_truth/human_minutes_gt_pairs.jsonl'
          touch "$GI"
          if grep -qxF "$LINE" "$GI"; then
            echo "General GT-pairs negation already present in data-lake/.gitignore"
          else
            printf '\n# Un-ignore human-authored GT pairs for ALL meetings\n%s\n' "$LINE" >> "$GI"
            echo "Appended general GT-pairs negation to data-lake/.gitignore:"
            echo "  $LINE"
          fi

      - name: Build transcript / minutes match table
        id: match
        run: |
          set -euo pipefail
          SKIP_FLAG="--skip-existing"
          if [ "${{ github.event.inputs.skip_existing }}" = "false" ]; then
            SKIP_FLAG="--no-skip-existing"
          fi
          # Human-readable table -> job log + step summary.
          python scripts/_match_minutes_transcripts.py \
            --data-lake "${{ github.workspace }}/data-lake" \
            $SKIP_FLAG --format table | tee /tmp/match_table.txt
          {
            echo "## Transcript / Minutes match table";
            echo '```';
            cat /tmp/match_table.txt;
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"
          # Machine-readable plan -> consumed by the process step.
          python scripts/_match_minutes_transcripts.py \
            --data-lake "${{ github.workspace }}/data-lake" \
            $SKIP_FLAG --format json > /tmp/match_plan.json
          echo "Plan written to /tmp/match_plan.json"

      - name: Process each matched transcript (sequential)
        id: process
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          python - <<'EOF'
          import json, os, pathlib, subprocess, sys

          ws = os.environ["GITHUB_WORKSPACE"]
          data_lake = os.path.join(ws, "data-lake")
          dry = os.environ.get("DRY_RUN", "true") == "true"

          plan = json.loads(
              pathlib.Path("/tmp/match_plan.json").read_text(encoding="utf-8")
          )
          targets = plan.get("to_process", [])

          results = []
          had_failures = False
          for t in targets:
              sid = t["source_id"]
              minutes_file = t["minutes_file"]
              cmd = [
                  sys.executable, "scripts/create_human_gt_pairs.py",
                  "--data-lake", data_lake,
                  "--source-id", sid,
                  "--minutes-file", minutes_file,
              ]
              if dry:
                  cmd.append("--dry-run")
              print(f"\n=== {sid}  <-  {minutes_file} (dry={dry}) ===")
              proc = subprocess.run(
                  cmd, capture_output=True, text=True, cwd=ws
              )
              sys.stdout.write(proc.stdout)
              if proc.stderr:
                  sys.stderr.write(proc.stderr)
              try:
                  summary = json.loads(proc.stdout)
              except json.JSONDecodeError:
                  summary = {
                      "status": "failure",
                      "reason": "unparseable_output",
                  }
              ok = proc.returncode == 0 and summary.get("status") == "success"
              if not ok:
                  had_failures = True
              results.append(
                  {
                      "source_id": sid,
                      "minutes_file": minutes_file,
                      "date": t.get("date"),
                      "status": summary.get("status"),
                      "reason": summary.get("reason", ""),
                      "pairs": summary.get(
                          "pairs_extracted",
                          summary.get("pairs_written", 0),
                      ),
                      "by_type": summary.get("by_type", {}),
                  }
              )

          report = {
              "dry_run": dry,
              "counts": plan.get("counts", {}),
              "processed": results,
              "skipped_existing": plan.get("skipped_existing", []),
              "no_minutes": plan.get("no_minutes", []),
              "ambiguous": plan.get("ambiguous", []),
              "minutes_without_transcript": plan.get(
                  "minutes_without_transcript", []
              ),
          }
          pathlib.Path("/tmp/batch_report.json").write_text(
              json.dumps(report, indent=2, sort_keys=True), encoding="utf-8"
          )

          gh_out = os.environ.get("GITHUB_OUTPUT")
          if gh_out:
              with open(gh_out, "a", encoding="utf-8") as f:
                  f.write(f"had_failures={'true' if had_failures else 'false'}\n")
                  f.write(f"processed_count={len(results)}\n")
          # Never crash the loop; the final assert step decides job status
          # so the push step can still land the pairs that DID succeed.
          print(f"\nProcessed {len(results)} transcript(s); "
                f"had_failures={had_failures}")
          EOF

      - name: Push all GT pairs to nicklasorte/data-lake (single commit)
        if: ${{ always() && github.event.inputs.dry_run != 'true' }}
        uses: ./.github/actions/push-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}
          commit_message: >-
            evals: batch human-authored GT pairs for all transcripts with
            minutes [skip ci]
          add_paths: |
            .gitignore
            store/processed/meetings/*/ground_truth/human_minutes_gt_pairs.jsonl

      - name: Post batch summary
        if: always()
        run: |
          python - <<'EOF'
          import json, os, pathlib

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
          p = pathlib.Path("/tmp/batch_report.json")
          with open(summary_path, "a", encoding="utf-8") as f:
              f.write("\n## Batch human-authored GT pairs\n\n")
              if not p.is_file():
                  f.write("No batch report produced (process step did not run).\n")
                  raise SystemExit(0)
              data = json.loads(p.read_text(encoding="utf-8"))
              c = data.get("counts", {})
              f.write(f"- dry_run: **{data.get('dry_run')}**\n")
              f.write(f"- transcripts total: {c.get('transcripts_total')}\n")
              f.write(f"- minutes total: {c.get('minutes_total')}\n")
              f.write(f"- matched: **{c.get('matched')}**\n")
              f.write(f"- already had GT pairs (skipped): "
                      f"**{c.get('skipped_existing')}**\n")
              f.write(f"- processed this run: **{c.get('to_process')}**\n")
              f.write(f"- no minutes (skipped): {c.get('no_minutes')}\n")
              f.write(f"- ambiguous (skipped): {c.get('ambiguous')}\n\n")
              f.write("| source_id | minutes | date | status | pairs |\n")
              f.write("|---|---|---|---|---|\n")
              for r in data.get("processed", []):
                  f.write(
                      f"| {r['source_id']} | {r['minutes_file']} | "
                      f"{r.get('date')} | {r.get('status')} | "
                      f"{r.get('pairs')} |\n"
                  )
              if not data.get("processed"):
                  f.write("| (none) | | | | |\n")
          EOF

      - name: Fail job if any transcript failed
        if: ${{ always() && steps.process.outputs.had_failures == 'true' }}
        run: |
          echo "::error::One or more transcripts failed GT-pair extraction."
          echo "See the batch summary table and the per-transcript logs above."
          echo "(Pairs that DID succeed were still committed.)"
          exit 1
