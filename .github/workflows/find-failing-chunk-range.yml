name: Find Failing Chunk Range (Binary Search)

# Self-contained binary search to find the minimum MAX_CHUNKS value that
# causes `failed:required_meeting_minutes_fields`. Dispatch once with
# `source_id` and `total_chunks`, walk away, get the answer in the step
# summary.
#
# No debug flags. No toggles. The bash loop below calls the
# `meeting-minutes-llm` CLI directly with different `--max-chunks` values
# — no sub-workflow dispatches — and bisects the [1, total_chunks] range
# until a single failing chunk count is identified.
#
# This workflow is observe-only: every CLI invocation passes
# `--max-chunks`, which produces a truncated artifact that
# `debug-llm-extraction.yml` already documents as NEVER pushed to the
# append-only data-lake. No persistence step is needed.

on:
  workflow_dispatch:
    inputs:
      source_id:
        description: 'Source ID to binary search'
        required: true
        default: '7-ghz-downlink-tig-meeting-kickoff---transcript-20251218'
      total_chunks:
        description: 'Total number of chunks in the transcript'
        required: true
        default: '138'

permissions:
  contents: read

jobs:
  find-failing-chunk-range:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
      SOURCE_ID: ${{ github.event.inputs.source_id }}
      TOTAL_CHUNKS: ${{ github.event.inputs.total_chunks }}
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Binary search for minimum failing chunk count
        run: |
          set +e

          # Validate TOTAL_CHUNKS is a positive integer
          if ! [[ "${TOTAL_CHUNKS}" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::total_chunks must be a positive integer, got: '${TOTAL_CHUNKS}'"
            exit 1
          fi

          low=1
          high="${TOTAL_CHUNKS}"

          run_cli() {
            local n="$1"
            python -m spectrum_systems_core.cli meeting-minutes-llm \
              --source-id "${SOURCE_ID}" \
              --data-lake "${DATA_LAKE_PATH}" \
              --max-chunks "${n}" > /tmp/out.log 2>&1
          }

          # -----------------------------------------------------------------
          # Invariant 1: a full run at TOTAL_CHUNKS must FAIL. If it
          # passes, there is no failure to bisect — bail out with a
          # visible message instead of looping pointlessly.
          # -----------------------------------------------------------------
          echo "==> Invariant check: MAX_CHUNKS=${high} (full run) should FAIL..."
          if run_cli "${high}"; then
            echo "UNEXPECTED: full run passed. No failure to find."
            {
              echo "## Binary Search Result"
              echo ""
              echo "**UNEXPECTED**: full run at MAX_CHUNKS=${high} PASSED."
              echo ""
              echo "There is no failure to bisect on this transcript."
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi
          echo "    FAIL (as expected)"

          # -----------------------------------------------------------------
          # Invariant 2: MAX_CHUNKS=1 must PASS. If it fails, the
          # failure starts at the very first chunk — the bisect has
          # nothing to narrow.
          # -----------------------------------------------------------------
          if [ "${high}" -gt 1 ]; then
            echo "==> Invariant check: MAX_CHUNKS=1 should PASS..."
            if ! run_cli 1; then
              echo "UNEXPECTED: chunk 1 failed. Failure starts at chunk 1."
              {
                echo "## Binary Search Result"
                echo ""
                echo "**UNEXPECTED**: MAX_CHUNKS=1 FAILED."
                echo ""
                echo "The failure starts at the very first chunk. There is"
                echo "no passing prefix to bisect against."
                echo ""
                echo "### reason"
                echo '```'
                grep -oE 'reason_codes?=[^ ]+' /tmp/out.log | head -1 \
                  || echo "(no reason_code line emitted)"
                echo '```'
              } >> "${GITHUB_STEP_SUMMARY}"
              exit 0
            fi
            echo "    PASS (as expected)"
            # The invariant proved chunk 1 passes, so the search space
            # is [2, high]. Move `low` past the verified-passing point.
            low=2
          fi

          # -----------------------------------------------------------------
          # Binary search. Invariants above prove low<=high holds and
          # that the range contains the transition point. Each iteration
          # halves [low, high]; the loop terminates when low==high, the
          # minimum failing chunk count.
          # -----------------------------------------------------------------
          while [ "${low}" -lt "${high}" ]; do
            mid=$(( (low + high) / 2 ))
            echo "==> Testing MAX_CHUNKS=${mid}..."
            if run_cli "${mid}"; then
              echo "    PASS"
              low=$(( mid + 1 ))
            else
              REASON="$(grep -oE 'reason_codes?=[^ ]+' /tmp/out.log | head -1)"
              echo "    FAIL: ${REASON:-(no reason_code line emitted)}"
              high="${mid}"
            fi
            echo "    Range: [${low}, ${high}]"
          done

          # -----------------------------------------------------------------
          # Result: `low` (== `high`) is the minimum chunk count that
          # produces the failure. low-1 is the largest passing prefix.
          # -----------------------------------------------------------------
          FAIL_REASON="$(grep -oE 'reason_codes?=[^ ]+' /tmp/out.log | head -1)"
          {
            echo "## Binary Search Result"
            echo ""
            echo "- Minimum failing chunk count: **${low}**"
            echo "- MAX_CHUNKS=$(( low - 1 )) → PASS"
            echo "- MAX_CHUNKS=${low} → FAIL"
            if [ -n "${FAIL_REASON}" ]; then
              echo "- Failure reason: \`${FAIL_REASON}\`"
            fi
            echo ""
            echo "Next step: dispatch \`debug-llm-extraction\` with"
            echo "\`MAX_CHUNKS=${low}\` and \`DEBUG_CHUNKS=true\` to see"
            echo "which chunk triggers the failure."
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "=============================="
          echo "RESULT: Minimum failing chunk count = ${low}"
          echo "=============================="
