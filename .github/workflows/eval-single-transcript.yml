name: Eval single transcript

# Phase P1: read-only 30-second feedback loop for the deterministic
# two-stage alignment. Runs eval-ground-truth against a single
# transcript and posts coverage / precision / spurious-add-rate /
# per-outcome F1 to the workflow's step summary. Does NOT run the
# extraction pipeline.
#
# Post-migration: clones nicklasorte/data-lake (read-only by default).
# If --set-baseline is requested, the resulting summary is pushed back.

on:
  workflow_dispatch:
    inputs:
      source_id:
        description: "Source ID (slug) of the transcript to evaluate"
        required: true
        default: "7-ghz-downlink-tig-meeting-kickoff---transcript-20251218"
      set_baseline:
        description: "Set this run as the new baseline (default: false)"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  eval-single-transcript:
    runs-on: ubuntu-latest
    env:
      SOURCE_ID: ${{ github.event.inputs.source_id }}
      SET_BASELINE: ${{ github.event.inputs.set_baseline }}
      DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
      SDL_ROOT: ${{ github.workspace }}/data-lake/store/artifacts
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" --break-system-packages 2>/dev/null || pip install -e ".[dev]"

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Run eval-ground-truth
        run: |
          BASELINE_FLAG=""
          if [ "$SET_BASELINE" = "true" ]; then
            BASELINE_FLAG="--set-baseline"
          fi
          python -m spectrum_systems_core.cli eval-ground-truth \
            --data-lake "$DATA_LAKE_PATH" \
            --specific-source-id "$SOURCE_ID" \
            $BASELINE_FLAG

      - name: Push baseline to nicklasorte/data-lake
        # Only push when the run wrote a new baseline; otherwise this
        # workflow is read-only by contract.
        if: ${{ env.SET_BASELINE == 'true' }}
        uses: ./.github/actions/push-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}
          commit_message: >-
            eval-single-transcript baseline for ${{ env.SOURCE_ID }}
            (run ${{ github.run_id }}) [skip ci]
          add_paths: |
            store/artifacts/evals/

      - name: Post eval scores to step summary
        if: always()
        run: |
          python - <<'PY'
          import json, os, pathlib

          dl = pathlib.Path(os.environ["DATA_LAKE_PATH"])
          source_id = os.environ["SOURCE_ID"]
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")

          evals_dir = dl / "store/artifacts/evals"
          summaries = sorted(
              evals_dir.glob("eval_summary_*.json"),
              key=lambda p: p.stat().st_mtime,
              reverse=True
          )

          with open(summary_path, "a") as f:
              f.write(f"## Eval results: `{source_id}`\n\n")
              if not summaries:
                  f.write("No eval summary found.\n")
              else:
                  doc = json.loads(summaries[0].read_text())
                  coverage = doc.get("aggregate_coverage", doc.get("coverage", "?"))
                  precision = doc.get("aggregate_precision", doc.get("precision", "?"))
                  spurious = doc.get("spurious_add_rate", "?")
                  gate = doc.get("gate_decision", "?")
                  f1_by_outcome = doc.get("per_outcome_f1", {})

                  # Phase P3-A T-4: pull the new rollup fields. ``?`` is
                  # rendered when the field is null or absent so an
                  # operator can recognise pre-P3-A artifacts at a glance.
                  off_topic_rate = doc.get("off_topic_rate", "?")
                  extraction_path_breakdown = doc.get("extraction_path_breakdown", {})
                  source_turn_orphan_rate = doc.get("source_turn_orphan_rate", "?")
                  source_turn_diversity_rate = doc.get("source_turn_diversity_rate", "?")
                  glossary_version = doc.get("glossary_version", "?")
                  extraction_mode = doc.get("extraction_mode", "?")
                  stakeholders_populated_rate = doc.get("stakeholders_populated_rate", "?")
                  rationale_populated_rate = doc.get("rationale_populated_rate", "?")
                  claim_type_populated_rate = doc.get("claim_type_populated_rate", "?")
                  population_rate_note = doc.get("population_rate_note")

                  f.write(f"| Metric | Value |\n")
                  f.write(f"|--------|-------|\n")
                  f.write(f"| Coverage | `{coverage}` |\n")
                  f.write(f"| Precision | `{precision}` |\n")
                  f.write(f"| Spurious-add rate | `{spurious}` |\n")
                  f.write(f"| Gate decision | `{gate}` |\n")
                  f.write(f"| Extraction mode | `{extraction_mode}` |\n")
                  f.write(f"| Glossary version | `{glossary_version}` |\n")
                  f.write(f"| Off-topic rate | `{off_topic_rate}` |\n")
                  f.write(f"| Source-turn orphan rate | `{source_turn_orphan_rate}` |\n")
                  f.write(f"| Source-turn diversity rate | `{source_turn_diversity_rate}` |\n")
                  f.write(f"| Stakeholders populated | `{stakeholders_populated_rate}` |\n")
                  f.write(f"| Rationale populated | `{rationale_populated_rate}` |\n")
                  f.write(f"| Claim_type populated | `{claim_type_populated_rate}` |\n")

                  if isinstance(extraction_path_breakdown, dict) and extraction_path_breakdown:
                      f.write(f"\n### Extraction path breakdown\n\n")
                      f.write(f"| Label | Chunks |\n")
                      f.write(f"|-------|--------|\n")
                      for label in ("decision", "claim", "action_item", "off_topic"):
                          count = extraction_path_breakdown.get(label, 0)
                          f.write(f"| {label} | `{count}` |\n")

                  if population_rate_note:
                      f.write(f"\n> {population_rate_note}\n")

                  if f1_by_outcome:
                      f.write(f"\n### F1 by outcome type\n\n")
                      f.write(f"| Outcome | F1 |\n")
                      f.write(f"|---------|----|\n")
                      for outcome, f1 in f1_by_outcome.items():
                          f.write(f"| {outcome} | `{f1:.3f}` |\n")

                  pairs = doc.get("pairs", [])
                  if pairs:
                      f.write(f"\n### Per-pair results\n\n")
                      f.write(f"| pair_id | coverage | precision | spurious |\n")
                      f.write(f"|---------|----------|-----------|----------|\n")
                      for p in pairs:
                          pid = str(p.get("pair_id", "?"))[:8]
                          f.write(
                              f"| `{pid}...` | {p.get('coverage', '?')} "
                              f"| {p.get('precision', '?')} "
                              f"| {p.get('spurious_add_rate', '?')} |\n"
                          )

                  review_items = doc.get("review_queue_count", 0)
                  if review_items:
                      f.write(f"\n**{review_items} item(s) in review queue** -- "
                              f"run `verify-few-shot-example` to adjudicate.\n")
          PY
