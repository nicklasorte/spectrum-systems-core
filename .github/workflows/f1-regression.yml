name: F1 regression gate

# Phase Z.3 — protects a merged prompt change from silently
# regressing Dec 18 F1. ALL logic lives in
# scripts/check_f1_regression.py; this workflow only clones the
# data-lake and invokes the script (no logic in YAML).
#
# The script loads the most recently promoted
# extraction_alignment_comparison for the Dec 18 transcript as the
# baseline, re-executes the (pure, no-model) comparator against the
# SAME frozen ceiling + most recent promoted Haiku extraction, and
# fails when delta_total_f1 <= -0.02 OR any per-type delta <= -0.05.
# With no baseline yet on disk it prints baseline_not_yet_established
# and exits 0. The F1_REGRESSION_GATE_ENABLED env (default true) is
# the operator rollback switch.

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  f1-regression:
    runs-on: ubuntu-latest
    env:
      DATA_LAKE_PATH: ${{ github.workspace }}/data-lake
      F1_REGRESSION_GATE_ENABLED: ${{ vars.F1_REGRESSION_GATE_ENABLED || 'true' }}
    steps:
      - name: Checkout spectrum-systems-core
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Clone nicklasorte/data-lake
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Run F1 regression gate
        run: python scripts/check_f1_regression.py
