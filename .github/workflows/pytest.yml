name: pytest

# Most tests use tmp_path fixtures and have no data-lake dependency.
# A handful of tests assert against the live glossary artifact in
# nicklasorte/data-lake; those tests skip cleanly when the data-lake
# clone is absent, so pytest does not strictly require the token.
# When the token IS present (default branch and direct PRs), the clone
# is performed so every test runs.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      # Evaluating ``secrets.X`` happens at the job-env scope (a
      # documented-safe place for the secrets context) and exposes
      # a non-empty marker the step-level ``if:`` can compare without
      # touching the secrets context itself.
      DATA_LAKE_TOKEN_PRESENT: ${{ secrets.DATA_LAKE_TOKEN != '' && 'yes' || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone nicklasorte/data-lake (when token available)
        # Forked PRs do not have access to repo secrets. Tests that
        # depend on the live glossary artifact pytest.skip() when the
        # clone is absent, so this step is opportunistic.
        if: env.DATA_LAKE_TOKEN_PRESENT == 'yes'
        uses: ./.github/actions/clone-data-lake
        with:
          data_lake_token: ${{ secrets.DATA_LAKE_TOKEN }}

      - name: Install package with dev extras
        run: python -m pip install -e ".[dev]"

      - name: Verify Phase 2P glossary manifest hashes
        # Fails closed if data/glossary/MANIFEST.json claims a sha256
        # that does not match the canonicalized JSONL or
        # allowed_sources.json. Pure stdlib so it runs without test
        # deps; placed AFTER the install step only so the imported
        # loader helpers stay byte-identical with the test layer.
        run: python scripts/verify_glossary_manifest.py

      - name: Verify Phase 2P glossary internal consistency
        # Fails closed if two glossary entries share an alias but
        # disagree on the definition after whitespace normalization.
        run: python scripts/verify_glossary_consistency.py

      - name: Verify Phase 3P few-shot manifest + ordering
        # Fails closed if data/few_shot/MANIFEST.json claims a sha256
        # that does not match the canonicalised JSONL bytes, or if the
        # LAST registry entry is not implicit_decision (recency-bias
        # property). Pure stdlib so it runs without test deps.
        run: python -c "import sys; sys.path.insert(0, 'src'); from spectrum_systems_core.few_shot import load_few_shot_registry; reg = load_few_shot_registry(); assert reg.entries[-1].example_type == 'implicit_decision', f'last entry must be implicit_decision (got {reg.entries[-1].example_type!r})'; print('OK', 'hash=' + reg.version_hash)"

      - name: Verify Phase 3P few-shot speaker-name scanner (warning-only)
        # Heuristic scan for un-stripped speaker names in the registry.
        # Warning-only (exits 0 even on findings); the PR description
        # is expected to document any flagged sequences.
        run: python scripts/verify_fewshot_speaker_names.py

      - name: Verify Phase 3P few-shot negative-transfer guard (fixture)
        # Run against the CI fixture which carries a stable source plus
        # an insufficient source. The fixture is decoupled from the
        # live prompt-file hash via --current-hash. The matching
        # regression fixture is exercised by tests/few_shot/test_regression_guard.py;
        # this step asserts the script ALSO works as a CLI gate.
        run: python scripts/verify_fewshot_no_regression.py --lake tests/fixtures/few_shot_regression_passing --current-hash POST_HASH_SENTINEL

      - name: Run pytest
        run: |
          set -o pipefail
          python -m pytest -rA --tb=short 2>&1 | tee /tmp/pytest_output.txt

      - name: Surface pytest failures to step summary
        # Runs only when the pytest step failed. The raw Actions log
        # requires auth to read; the step summary renders on the public
        # checks page, so a failure digest here is retrievable without
        # admin rights. Diagnostic only — does not change pass/fail.
        if: failure()
        run: |
          {
            echo "## pytest failures"
            echo ""
            echo '```'
            # The short-test-summary block pytest prints at the end with
            # -rA: every FAILED/ERROR line plus the assertion message.
            sed -n '/=* short test summary info =*/,$p' /tmp/pytest_output.txt \
              || tail -n 200 /tmp/pytest_output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
